<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI REAL BACKTEST</title>
    <style>
        body { background: #05080f; color: white; font-family: system-ui; padding: 16px; }
        .card { background: #0f1522; padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        button { background: #6366f1; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
        select, input { background: #1a2030; color: white; border: 1px solid #2a2e38; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        .stat { display: inline-block; width: 48%; text-align: center; margin: 5px 1%; padding: 10px; background: #1a2030; border-radius: 12px; }
        .value { font-size: 24px; font-weight: bold; }
        .green { color: #00ff88; }
        .red { color: #ff4466; }
        hr { border-color: #2a2e38; margin: 15px 0; }
        .loader { text-align: center; padding: 20px; }
        .real-badge { background: #00ff8822; color: #00ff88; padding: 4px 8px; border-radius: 8px; font-size: 10px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<h1>🔬 OMNI REAL BACKTEST</h1>
<div><span class="real-badge">✅ REAL DATA from CoinGecko</span></div>
<div style="font-size: 12px; color: #8a99b0; margin: 8px 0 16px 0;">Crypto only (forex APIs block mobile browsers)</div>

<div class="card">
    <select id="symbol">
        <option value="bitcoin">₿ Bitcoin (BTC/USD)</option>
        <option value="ethereum">Ξ Ethereum (ETH/USD)</option>
        <option value="solana">◎ Solana (SOL/USD)</option>
    </select>
    
    <select id="days">
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 180 days</option>
        <option value="365" selected>Last 365 days</option>
    </select>
    
    <input type="number" id="balance" value="7200" placeholder="Balance">
    
    <button onclick="runBacktest()">🚀 RUN BACKTEST (REAL DATA)</button>
</div>

<div id="results" class="card">
    Tap RUN to fetch REAL crypto data from CoinGecko
</div>

<script>
    async function runBacktest() {
        const symbol = document.getElementById('symbol').value;
        const days = document.getElementById('days').value;
        const balance = parseFloat(document.getElementById('balance').value);
        const startingBalance = balance;
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loader">📡 Fetching REAL data from CoinGecko...</div>';
        
        try {
            // REAL data from CoinGecko
            const url = `https://api.coingecko.com/api/v3/coins/${symbol}/market_chart?vs_currency=usd&days=${days}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.prices) throw new Error('No data from CoinGecko');
            
            // Build candles from real price data
            let candles = [];
            const prices = data.prices;
            for (let i = 1; i < prices.length; i++) {
                candles.push({
                    time: prices[i][0],
                    open: prices[i-1][1],
                    high: Math.max(prices[i-1][1], prices[i][1]),
                    low: Math.min(prices[i-1][1], prices[i][1]),
                    close: prices[i][1]
                });
            }
            
            resultsDiv.innerHTML = '<div class="loader">📊 Analyzing ' + candles.length + ' real candles...</div>';
            await new Promise(r => setTimeout(r, 100));
            
            // ========== SIMPLIFIED STRATEGY (NO FAKE DATA) ==========
            function getSignal(candles, index) {
                if (index < 30) return null;
                
                const price = candles[index-1].close;
                const recentLows = candles.slice(index-20, index).map(c => c.low);
                const recentHighs = candles.slice(index-20, index).map(c => c.high);
                const support = Math.min(...recentLows);
                const resistance = Math.max(...recentHighs);
                
                // BOS detection
                const highs = candles.slice(index-30, index).map(c => c.high);
                const lows = candles.slice(index-30, index).map(c => c.low);
                const recentHigh = Math.max(...highs.slice(-10));
                const prevHigh = Math.max(...highs.slice(-20, -10));
                const recentLow = Math.min(...lows.slice(-10));
                const prevLow = Math.min(...lows.slice(-20, -10));
                const bosBullish = recentHigh > prevHigh;
                const bosBearish = recentLow < prevLow;
                
                const atSupport = Math.abs(price - support) / price < 0.0005;
                const atResistance = Math.abs(price - resistance) / price < 0.0005;
                
                // BUY
                if (atSupport && bosBullish) {
                    return { bias: 'BUY', price: price, grade: 'A' };
                }
                // SELL
                if (atResistance && bosBearish) {
                    return { bias: 'SELL', price: price, grade: 'A' };
                }
                
                return null;
            }
            
            // Run backtest on real data
            let currentBalance = balance;
            let trades = [];
            let openTrade = null;
            
            let stopDist = symbol === 'bitcoin' ? 800 : (symbol === 'ethereum' ? 50 : 5);
            let rr = 2.0;
            
            for (let i = 60; i < candles.length; i++) {
                // Check existing trade
                if (openTrade) {
                    let exited = false;
                    for (let j = openTrade.entryIndex + 1; j <= i; j++) {
                        if (openTrade.bias === 'BUY') {
                            if (candles[j].high >= openTrade.tp) {
                                let profit = (openTrade.tp - openTrade.entry) / openTrade.entry * currentBalance * 0.01;
                                currentBalance += profit;
                                trades.push({ ...openTrade, pnl: profit, win: true });
                                exited = true;
                                break;
                            } else if (candles[j].low <= openTrade.sl) {
                                let loss = -(openTrade.entry - openTrade.sl) / openTrade.entry * currentBalance * 0.01;
                                currentBalance += loss;
                                trades.push({ ...openTrade, pnl: loss, win: false });
                                exited = true;
                                break;
                            }
                        } else {
                            if (candles[j].low <= openTrade.tp) {
                                let profit = (openTrade.entry - openTrade.tp) / openTrade.entry * currentBalance * 0.01;
                                currentBalance += profit;
                                trades.push({ ...openTrade, pnl: profit, win: true });
                                exited = true;
                                break;
                            } else if (candles[j].high >= openTrade.sl) {
                                let loss = -(openTrade.sl - openTrade.entry) / openTrade.entry * currentBalance * 0.01;
                                currentBalance += loss;
                                trades.push({ ...openTrade, pnl: loss, win: false });
                                exited = true;
                                break;
                            }
                        }
                    }
                    if (exited) openTrade = null;
                }
                
                // New signal
                if (!openTrade) {
                    let signal = getSignal(candles, i);
                    if (signal) {
                        let sl = signal.bias === 'BUY' ? signal.price - stopDist : signal.price + stopDist;
                        let risk = Math.abs(signal.price - sl);
                        let tp = signal.bias === 'BUY' ? signal.price + (risk * rr) : signal.price - (risk * rr);
                        
                        openTrade = {
                            entryIndex: i,
                            entry: signal.price,
                            bias: signal.bias,
                            grade: signal.grade,
                            sl: sl,
                            tp: tp
                        };
                    }
                }
            }
            
            // Calculate REAL results
            let wins = trades.filter(t => t.win).length;
            let losses = trades.filter(t => !t.win).length;
            let winRate = trades.length > 0 ? (wins / trades.length * 100).toFixed(1) : 0;
            let totalReturn = ((currentBalance - startingBalance) / startingBalance * 100).toFixed(2);
            
            let gradeStats = {};
            trades.forEach(t => {
                if (!gradeStats[t.grade]) gradeStats[t.grade] = { wins: 0, total: 0 };
                gradeStats[t.grade].total++;
                if (t.win) gradeStats[t.grade].wins++;
            });
            
            let gradeHtml = '';
            for (let g in gradeStats) {
                let wr = (gradeStats[g].wins / gradeStats[g].total * 100).toFixed(1);
                gradeHtml += `<div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2e38;">
                    <span><strong>${g}</strong></span>
                    <span>${gradeStats[g].total} trades</span>
                    <span class="${wr >= 50 ? 'green' : 'red'}">${wr}% win rate</span>
                </div>`;
            }
            
            let symbolName = symbol === 'bitcoin' ? 'Bitcoin' : (symbol === 'ethereum' ? 'Ethereum' : 'Solana');
            let dataPointCount = candles.length;
            
            resultsDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 15px;">
                    <strong>${symbolName}</strong> | ${days} days | ${dataPointCount} REAL candles
                </div>
                <div>
                    <div class="stat"><div class="value">${trades.length}</div><div>Trades</div></div>
                    <div class="stat"><div class="value ${winRate >= 50 ? 'green' : 'red'}">${winRate}%</div><div>Win Rate</div></div>
                    <div class="stat"><div class="value ${totalReturn >= 0 ? 'green' : 'red'}">${totalReturn}%</div><div>Return</div></div>
                    <div class="stat"><div class="value">$${currentBalance.toFixed(0)}</div><div>Balance</div></div>
                </div>
                <hr>
                <div><strong>📊 Performance by Grade</strong></div>
                ${gradeHtml || '<div style="padding: 15px; text-align: center;">No trades generated</div>'}
                <hr>
                <div style="font-size: 11px; color: #8a99b0;">
                    ✅ Data source: <strong>CoinGecko (REAL historical prices)</strong><br>
                    Strategy: BOS + Support/Resistance | Risk: 1% | RR: 1:2<br>
                    Period: Last ${days} days | Starting balance: $${startingBalance}
                </div>
                ${trades.length === 0 ? '<div style="margin-top: 12px; padding: 12px; background: #ff446622; border-radius: 8px; text-align: center;">No trades found. Try different symbol or days.</div>' : ''}
            `;
            
        } catch(err) {
            resultsDiv.innerHTML = `<div class="loader" style="color: #ff4466;">❌ Error: ${err.message}<br><br>CoinGecko works best with BTC, ETH, SOL. Try refreshing.</div>`;
        }
    }
</script>
</body>
</html>
