<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | V62.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; }
        .neon-text { text-shadow: 0 0 15px rgba(0,242,255,0.6); }
        .active-border { border-color: #00f2ff !important; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
    </style>
</head>
<body class="bg-black select-none">

    <div id="terminalContainer" class="p-6 max-w-lg mx-auto flex flex-col h-screen overflow-hidden">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-4xl font-900 italic tracking-tighter neon-text text-cyan-400 leading-none uppercase">OMNI—DUAL</h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold mt-2">TERMINAL ACTIVE V62.6</p>
            </div>
            <button onclick="ui_toggle()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center active:scale-90">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </button>
        </div>

        <div class="glass rounded-[32px] p-6 mb-8 flex items-center justify-between">
            <span class="text-[8px] font-black uppercase text-white/20 tracking-widest">Aggressive Scalp</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="stratToggle" class="sr-only peer">
                <div class="w-14 h-8 bg-white/5 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-cyan-500"></div>
            </label>
            <span class="text-[8px] font-black uppercase text-white/20 tracking-widest">Surgical Day</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div id="box0" onclick="trigger_file(0)" class="glass h-36 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="f0" hidden onchange="load_file(0)">
                <div id="label0" class="text-[10px] font-black opacity-20 uppercase">1H Bias</div>
                <div id="tick0" class="hidden text-cyan-400 font-black text-[10px]">SYNCED</div>
            </div>
            <div id="box1" onclick="trigger_file(1)" class="glass h-36 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="f1" hidden onchange="load_file(1)">
                <div id="label1" class="text-[10px] font-black opacity-20 uppercase">15M Struct</div>
                <div id="tick1" class="hidden text-cyan-400 font-black text-[10px]">SYNCED</div>
            </div>
            <div id="box2" onclick="trigger_file(2)" class="glass h-36 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="f2" hidden onchange="handleFile(2)">
                <div id="label2" class="text-[10px] font-black opacity-20 uppercase">1M Trigger</div>
                <div id="tick2" class="hidden text-cyan-400 font-black text-[10px]">SYNCED</div>
            </div>
            <div id="box3" onclick="trigger_file(3)" class="glass h-36 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="f3" hidden onchange="load_file(3)">
                <div id="label3" class="text-[10px] font-black opacity-20 uppercase">DXY Data</div>
                <div id="tick3" class="hidden text-cyan-400 font-black text-[10px]">SYNCED</div>
            </div>
        </div>

        <button id="execBtn" onclick="run_engine()" class="w-full bg-white text-black font-900 py-6 rounded-[32px] uppercase tracking-[0.3em] text-[11px] mt-auto">Execute Command</button>
    </div>

    <div id="settingsPanel" class="fixed inset-0 z-[9999] bg-black hidden flex items-center justify-center p-8">
        <div class="w-full max-w-xs text-center">
            <h3 class="text-3xl font-900 italic tracking-tighter mb-12 uppercase text-cyan-400">CORE SYNC</h3>
            <div class="space-y-4">
                <input type="password" id="api_in" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-cyan-400 text-center font-black outline-none" placeholder="API_KEY">
                <div class="flex gap-4">
                    <input type="number" id="bal_in" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center font-black outline-none" placeholder="BAL $">
                    <input type="number" id="risk_in" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center font-black outline-none" placeholder="RISK %">
                </div>
                <button onclick="save_config()" class="w-full bg-white text-black font-900 py-6 rounded-2xl text-[10px] uppercase tracking-[0.4em] mt-8 active:scale-95 transition">Sync Core</button>
                <p onclick="ui_toggle()" class="text-[9px] uppercase tracking-widest text-white/20 mt-8 cursor-pointer">Return to Terminal</p>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
