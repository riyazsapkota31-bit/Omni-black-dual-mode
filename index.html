<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—BLACK | DUAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-glow { text-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-cyan-400 neon-glow uppercase">OMNI—BLACK</h1>
            <p class="text-[8px] font-bold text-white/30 tracking-[0.3em] uppercase mt-1">Sovereign v100 | Council of 8</p>
        </div>
        <button onclick="ui.toggleSettings()" class="p-3 glass rounded-2xl active:scale-95 transition-transform">⚙️</button>
    </div>

    <div class="flex gap-2 p-1 glass rounded-[28px] mb-8">
        <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-4 rounded-[25px] text-[10px] font-black uppercase tracking-widest bg-cyan-500 text-black shadow-[0_0_20px_rgba(6,182,212,0.5)] transition-all">Scalping</button>
        <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-4 rounded-[25px] text-[10px] font-black uppercase tracking-widest text-white/20 transition-all bg-white/5">Day Trading</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="box0" onclick="ui.trigger(0)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/5">
            <input type="file" id="f0" class="hidden" accept="image/*" onchange="engine.stage(0)">
            <span id="l0" class="text-[9px] font-bold text-white/20 uppercase tracking-widest">HTF (1H)</span>
            <span id="ok0" class="hidden text-cyan-400 text-3xl font-black">✓</span>
        </div>
        <div id="box1" onclick="ui.trigger(1)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/5">
            <input type="file" id="f1" class="hidden" accept="image/*" onchange="engine.stage(1)">
            <span id="l1" class="text-[9px] font-bold text-white/20 uppercase tracking-widest">MTF (15M)</span>
            <span id="ok1" class="hidden text-cyan-400 text-3xl font-black">✓</span>
        </div>
        <div id="box2" onclick="ui.trigger(2)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/5">
            <input type="file" id="f2" class="hidden" accept="image/*" onchange="engine.stage(2)">
            <span id="l2" class="text-[9px] font-bold text-white/20 uppercase tracking-widest text-center px-4">LTF (1M) TRIGGER</span>
            <span id="ok2" class="hidden text-cyan-400 text-3xl font-black">✓</span>
        </div>
        <div id="box3" onclick="ui.trigger(3)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/5">
            <input type="file" id="f3" class="hidden" accept="image/*" onchange="engine.stage(3)">
            <span id="l3" class="text-[9px] font-bold text-white/20 uppercase tracking-widest text-center px-4">DXY FILTER</span>
            <span id="ok3" class="hidden text-cyan-400 text-3xl font-black">✓</span>
        </div>
    </div>

    <button id="igniteBtn" onclick="engine.ignite()" class="w-full py-6 rounded-[35px] bg-white text-black font-black text-[11px] uppercase tracking-[0.3em] active:scale-95 transition-transform shadow-xl">Execute Surgical Scan</button>

    <div id="result-screen" class="fixed inset-0 bg-black z-50 p-8 hidden overflow-y-auto">
        <button onclick="document.getElementById('result-screen').classList.add('hidden')" class="mb-10 text-[9px] font-black text-white/40 uppercase tracking-widest">← Return to Command</button>
        <div class="text-center mb-12">
            <h2 id="res-bias" class="text-8xl font-black italic leading-none">--</h2>
            <div class="flex justify-center gap-4 mt-6">
                <span id="res-type" class="glass px-4 py-2 rounded-full text-[9px] font-black text-cyan-400 uppercase tracking-widest">--</span>
                <span id="res-asset" class="glass px-4 py-2 rounded-full text-[9px] font-black text-white/60 uppercase tracking-widest">--</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-6 rounded-[35px] text-center">
                <p class="text-[8px] text-white/20 mb-2 uppercase font-bold">Entry</p>
                <p id="res-entry" class="text-xl font-black tracking-tight">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center">
                <p class="text-[8px] text-white/20 mb-2 uppercase font-bold">Lots</p>
                <p id="res-lot" class="text-xl font-black tracking-tight text-cyan-400">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center">
                <p class="text-[8px] text-white/20 mb-2 uppercase font-bold">Stop Loss</p>
                <p id="res-sl" class="text-xl font-black tracking-tight text-red-500">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center">
                <p class="text-[8px] text-white/20 mb-2 uppercase font-bold">Take Profit</p>
                <p id="res-tp" class="text-xl font-black tracking-tight text-emerald-400">--</p>
            </div>
        </div>

        <div class="glass p-6 rounded-[35px] mb-6 text-center">
            <p class="text-[8px] text-white/20 mb-2 uppercase font-bold">Point of Interest (POI)</p>
            <p id="res-poi" class="text-xl font-black tracking-tight text-amber-400">--</p>
        </div>

        <div class="glass p-8 rounded-[45px] border-white/5">
            <p id="res-logic" class="text-[11px] leading-relaxed text-white/70 italic font-medium"></p>
        </div>
    </div>

    <div id="settings" class="fixed inset-0 bg-black/98 z-[60] p-10 hidden">
        <h3 class="text-xl font-black italic mb-8 uppercase text-cyan-400 tracking-tighter">Hardware Interface</h3>
        <input id="key" type="password" placeholder="GEMINI API KEY" class="w-full glass p-5 rounded-2xl mb-4 text-[10px] outline-none border-white/10">
        <div class="flex gap-4">
            <input id="bal" type="number" placeholder="BALANCE ($)" class="flex-1 glass p-5 rounded-2xl text-[10px] outline-none border-white/10">
            <input id="risk" type="number" placeholder="RISK %" class="w-24 glass p-5 rounded-2xl text-[10px] outline-none border-white/10">
        </div>
        <button onclick="ui.save()" class="w-full py-5 bg-cyan-500 text-black font-black rounded-2xl mt-8 text-[10px] uppercase tracking-[0.2em] shadow-lg">Synchronize System</button>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
