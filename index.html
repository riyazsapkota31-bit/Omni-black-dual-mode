<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI—BLACK | NEURAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        .terminal-btn { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .terminal-btn:active { scale: 0.95; opacity: 0.8; }
        input[type="checkbox"]:checked ~ .dot { transform: translateX(100%); background-color: #00f2ff; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto">

    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-900 italic tracking-tighter neon-text text-cyan-400">OMNI—BLACK</h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold">System Ready V62.6</span>
            </div>
        </div>
        <button onclick="toggleSettings()" class="w-10 h-10 glass rounded-xl flex items-center justify-center terminal-btn">
            <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
    </div>

    <div class="glass p-5 rounded-3xl mb-8 flex items-center justify-between">
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Aggressive Scalp</span>
        <label class="flex items-center cursor-pointer">
            <div class="relative">
                <input type="checkbox" id="mode-input" class="sr-only">
                <div class="block bg-white/5 w-14 h-8 rounded-full border border-white/10"></div>
                <div class="dot absolute left-1 top-1 bg-white/20 w-6 h-6 rounded-full transition-all duration-300"></div>
            </div>
        </label>
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div onclick="document.getElementById('f1').click()" class="glass h-36 rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f1" hidden onchange="handleUpload(event, 0)">
            <span class="text-[10px] font-bold text-white/10 uppercase group-hover:text-cyan-400/30 transition-colors">Box 01</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f2').click()" class="glass h-36 rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f2" hidden onchange="handleUpload(event, 1)">
            <span class="text-[10px] font-bold text-white/10 uppercase group-hover:text-cyan-400/30 transition-colors">Box 02</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f3').click()" class="glass h-36 rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f3" hidden onchange="handleUpload(event, 2)">
            <span class="text-[10px] font-bold text-white/10 uppercase group-hover:text-cyan-400/30 transition-colors">Box 03</span>
            <img id="p2" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f4').click()" class="glass h-36 rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden border-dashed border-cyan-500/20 group">
            <input type="file" id="f4" hidden onchange="handleUpload(event, 3)">
            <span class="text-[10px] font-bold text-cyan-400/40 uppercase tracking-widest">DXY Data</span>
            <img id="p3" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="w-full bg-cyan-500 text-black font-900 py-5 rounded-3xl uppercase tracking-[0.2em] text-xs shadow-lg shadow-cyan-500/20 terminal-btn">Execute Neural Command</button>

    <div id="settingsPanel" class="fixed inset-0 z-50 glass flex items-center justify-center p-6 hidden">
        <div class="bg-[#0a0a0a] w-full p-8 rounded-[40px] border border-white/10 relative">
            <button onclick="toggleSettings()" class="absolute top-6 right-6 text-white/20 hover:text-white">✕</button>
            <h3 class="text-xl font-900 mb-8 italic tracking-tighter">TERMINAL CONFIG</h3>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] uppercase font-black text-white/30 block mb-2">Gemini API Key</label>
                    <input type="password" id="apiKeyIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-cyan-500/50" placeholder="Paste Key Here...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] uppercase font-black text-white/30 block mb-2">Account Balance ($)</label>
                        <input type="number" id="balanceIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-cyan-500/50" placeholder="1000">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-black text-white/30 block mb-2">Risk Per Trade (%)</label>
                        <input type="number" id="riskIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-cyan-500/50" placeholder="1.5">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-black font-900 py-4 rounded-2xl text-[10px] uppercase tracking-widest mt-4">Sync Configuration</button>
            </div>
        </div>
    </div>

    <div id="outPanel" class="hidden mt-12 pb-20">
        <div class="text-center mb-8">
            <h2 id="biasTxt" class="text-8xl font-900 italic tracking-tighter leading-none mb-2">--</h2>
            <p class="text-[10px] text-white/20 uppercase tracking-[0.5em] font-black">Neural Link Established</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass p-5 rounded-3xl">
                <span class="text-[8px] text-white/30 uppercase block font-black mb-1">Optimal Entry</span>
                <span id="entVal" class="text-xl font-900 text-white tracking-tighter">--</span>
            </div>
            <div class="glass p-5 rounded-3xl">
                <span class="text-[8px] text-white/30 uppercase block font-black mb-1">Neural Lot Size</span>
                <span id="lotVal" class="text-xl font-900 text-cyan-400 tracking-tighter">--</span>
            </div>
            <div class="glass p-5 rounded-3xl border-rose-500/10">
                <span class="text-[8px] text-rose-500/40 uppercase block font-black mb-1">Stop Loss</span>
                <span id="slVal" class="text-xl font-900 text-rose-500 tracking-tighter">--</span>
            </div>
            <div class="glass p-5 rounded-3xl border-emerald-500/10">
                <span class="text-[8px] text-emerald-400/40 uppercase block font-black mb-1">Take Profit</span>
                <span id="tpVal" class="text-xl font-900 text-emerald-400 tracking-tighter">--</span>
            </div>
        </div>

        <div id="logicSummary" class="glass p-6 rounded-[32px] text-[11px] leading-relaxed text-white/60 font-medium uppercase tracking-tight italic"></div>
    </div>

    <script src="strategies.js"></script>
    <script>
        var files = [null, null, null, null];
        function handleUpload(e, i) {
            const f = e.target.files[0];
            if(!f) return;
            files[i] = f;
            const r = new FileReader();
            r.onload = (ev) => {
                const img = document.getElementById(`p${i}`);
                img.src = ev.target.result;
                img.classList.remove('hidden');
            };
            r.readAsDataURL(f);
        }
        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.classList.toggle('hidden');
            if(!p.classList.contains('hidden')) {
                document.getElementById('apiKeyIn').value = localStorage.getItem('omni_kIn') || '';
                document.getElementById('balanceIn').value = localStorage.getItem('omni_bIn') || '';
                document.getElementById('riskIn').value = localStorage.getItem('omni_rIn') || '';
            }
        }
        function saveSettings() {
            localStorage.setItem('omni_kIn', document.getElementById('apiKeyIn').value);
            localStorage.setItem('omni_bIn', document.getElementById('balanceIn').value);
            localStorage.setItem('omni_rIn', document.getElementById('riskIn').value);
            toggleSettings();
        }
    </script>
</body>
</html>
