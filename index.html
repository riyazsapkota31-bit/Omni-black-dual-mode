<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | SOVEREIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .active-ring { border: 2px solid #00f2ff !important; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); }
        .glow-text { text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
    </style>
</head>
<body class="p-6 bg-black">

    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-4xl font-900 italic tracking-tighter text-cyan-400 glow-text leading-none uppercase">OMNI—DUAL</h1>
            <p class="text-[8px] tracking-[0.3em] font-900 text-white/40 mt-2 uppercase">PIXEL-SCRAPE ENGINE: V80.0 | XM-PRECISION</p>
        </div>
        <button onclick="ui.toggleSettings()" class="p-3 bg-white/5 rounded-2xl border border-white/10 active:scale-90 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 14V3M1 14h6M9 8h6M17 14h6"/></svg>
        </button>
    </div>

    <div class="flex gap-2 bg-white/5 p-1 rounded-[24px] mb-8 border border-white/5">
        <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg">Scalping</button>
        <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest text-white/20">Day Trading</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="box0" onclick="ui.trigger(0)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f0" class="hidden" accept="image/*" onchange="engine.stage(0)">
            <span id="l0" class="text-[9px] font-900 text-cyan-400/40 uppercase tracking-widest text-center px-4">1 HR (H)</span>
            <span id="ok0" class="hidden text-cyan-400 text-3xl font-900">✓</span>
        </div>
        <div id="box1" onclick="ui.trigger(1)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f1" class="hidden" accept="image/*" onchange="engine.stage(1)">
            <span id="l1" class="text-[9px] font-900 text-cyan-400/40 uppercase tracking-widest text-center px-4">15 MIN (M)</span>
            <span id="ok1" class="hidden text-cyan-400 text-3xl font-900">✓</span>
        </div>
        <div id="box2" onclick="ui.trigger(2)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f2" class="hidden" accept="image/*" onchange="engine.stage(2)">
            <span id="l2" class="text-[9px] font-900 text-cyan-400/40 uppercase tracking-widest text-center px-4">1 MIN (L)</span>
            <span id="ok2" class="hidden text-cyan-400 text-3xl font-900">✓</span>
        </div>
        <div id="box3" onclick="ui.trigger(3)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f3" class="hidden" accept="image/*" onchange="engine.stage(3)">
            <span id="l3" class="text-[9px] font-900 text-cyan-400/40 uppercase tracking-widest text-center px-4">DXY INDEX</span>
            <span id="ok3" class="hidden text-cyan-400 text-3xl font-900">✓</span>
        </div>
    </div>

    <button id="igniteBtn" onclick="engine.ignite()" class="w-full py-6 rounded-[35px] bg-white text-black font-900 text-[11px] uppercase tracking-[0.3em]">
        Execute Logical Scan
    </button>

    <div id="result-screen" class="fixed inset-0 bg-black z-[60] p-6 hidden overflow-y-auto">
        <button onclick="document.getElementById('result-screen').classList.add('hidden')" class="mb-8 p-3 bg-white/10 rounded-2xl uppercase text-[8px] font-900 tracking-widest">← Return</button>
        <div class="text-center mb-10">
            <h3 id="res-bias" class="text-[110px] font-900 italic leading-none tracking-tighter uppercase">--</h3>
            <p id="res-asset" class="text-[12px] font-900 text-white/40 tracking-[0.5em] uppercase">MAPPING COORDINATES</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5 text-center">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Entry</p>
                <p id="res-entry" class="text-xl font-900 leading-none">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5 text-center">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Lots</p>
                <p id="res-lot" class="text-xl font-900 leading-none text-cyan-400">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5 text-center">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Stop Loss</p>
                <p id="res-sl" class="text-xl font-900 leading-none text-red-500">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5 text-center">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Take Profit</p>
                <p id="res-tp" class="text-xl font-900 leading-none text-emerald-400">--</p>
            </div>
        </div>
        <div class="bg-white/5 p-8 rounded-[40px] border border-white/5">
            <p id="res-logic" class="text-[11px] leading-relaxed font-400 text-white/70 italic"></p>
        </div>
    </div>

    <div id="settings" class="fixed inset-0 bg-black/95 z-50 p-8 hidden">
        <h2 class="text-2xl font-900 uppercase italic mb-8">System Hardware</h2>
        <input id="key" type="password" placeholder="GEMINI API KEY" class="w-full bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 text-[10px]">
        <div class="flex gap-4 mb-4">
            <input id="bal" type="number" placeholder="BALANCE" class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px]">
            <input id="risk" type="number" placeholder="RISK %" class="w-24 bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px]">
        </div>
        <button onclick="ui.save()" class="w-full py-4 bg-cyan-500 text-black font-900 rounded-2xl uppercase text-[10px]">Verify & Store</button>
    </div>

    <script>
        const state = { mode: 'scalp', payloads: [null, null, null, null], isSyncing: false };

        const ui = {
            toggleSettings: () => {
                document.getElementById('settings').classList.toggle('hidden');
                document.getElementById('key').value = localStorage.getItem('ob_k') || '';
                document.getElementById('bal').value = localStorage.getItem('ob_b') || '';
                document.getElementById('risk').value = localStorage.getItem('ob_r') || '';
            },
            trigger: (i) => document.getElementById(`f${i}`).click(),
            save: () => {
                localStorage.setItem('ob_k', document.getElementById('key').value);
                localStorage.setItem('ob_b', document.getElementById('bal').value);
                localStorage.setItem('ob_r', document.getElementById('risk').value);
                ui.toggleSettings();
            }
        };

        const engine = {
            setMode: (m) => {
                state.mode = m;
                document.getElementById('btnScalp').className = m === 'scalp' ? "flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg" : "flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest text-white/20";
                document.getElementById('btnDay').className = m === 'day' ? "flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg" : "flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest text-white/20";
            },

            stage: async (i) => {
                const file = document.getElementById(`f${i}`).files[0];
                if (file) {
                    document.getElementById(`l${i}`).classList.add('hidden');
                    document.getElementById(`ok${i}`).classList.remove('hidden');
                    document.getElementById(`box${i}`).classList.add('active-ring');
                    state.payloads[i] = await engine.compress(file);
                }
            },

            compress: (file) => {
                return new Promise(res => {
                    const r = new FileReader(); r.readAsDataURL(file);
                    r.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                            const max = 1800; // INCREASED FOR SURGICAL OCR
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > max) { h *= max / w; w = max; } } else { if (h > max) { w *= max / h; h = max; } }
                            c.width = w; c.height = h; ctx.drawImage(img, 0, 0, w, h);
                            res(c.toDataURL('image/jpeg', 0.95).split(',')[1]);
                        };
                    };
                });
            },

            ignite: async () => {
                const k = localStorage.getItem('ob_k'), b = localStorage.getItem('ob_b'), r = localStorage.getItem('ob_r');
                if (!k || !b || state.isSyncing) return ui.toggleSettings();
                if (!state.payloads[2] || !state.payloads[3]) return alert("Box 3 & Box 4 Mandatory.");

                state.isSyncing = true;
                const btn = document.getElementById('igniteBtn');
                btn.innerText = "PIXEL-SCRAPING ASSET COORDINATES...";

                const prompt = `ACT AS OMNI-DUAL SOVEREIGN V80. 
                    MANDATE: ZERO HALLUCINATION. DO NOT GUESS NUMBERS.
                    ACCOUNT: $${b} (XM STANDARD) | RISK: ${r}%.
                    MODE: ${state.mode === 'scalp' ? 'Scalp (RR 1.5-4)' : 'Day Trade (RR 4-10)'}.

                    SCRAPING PROTOCOL:
                    1. Read the vertical Y-Axis labels carefully. Identify the EXACT price (e.g. 81180.20).
                    2. If the price on the chart does not match your output entry, it is a CRITICAL FAILURE.
                    3. Asset Detection: Identify if it is BTCUSD, SOLUSD, or XAUUSD.
                    4. DXY Guard: If DXY is pumping, force bias to WATCHING or SELL for crypto/forex pairs.
                    5. SMC/ICT: Identify Liquidity Sweeps and FVG displacement before giving an entry.

                    STRICT JSON:
                    {"asset":"SYM","bias":"BUY/SELL/WATCHING","entry":"0.00","sl":"0.00","tp":"0.00","lots":"0.00","logic":"15-word institutional justification"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${k}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, ...state.payloads.filter(p => p).map(d => ({ inline_data: { mime_type: "image/jpeg", data: d } })) ] }],
                            generationConfig: { temperature: 0.1 } // TOTAL PRECISION LOCK
                        })
                    });

                    const data = await response.json();
                    const raw = data.candidates[0].content.parts[0].text;
                    const parsed = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);

                    const isW = parsed.bias === 'WATCHING';
                    document.getElementById('res-bias').innerText = parsed.bias;
                    document.getElementById('res-bias').className = `text-[110px] font-900 italic leading-none tracking-tighter uppercase ${parsed.bias === 'BUY' ? 'text-emerald-400' : parsed.bias === 'SELL' ? 'text-red-500' : 'text-amber-400'}`;
                    document.getElementById('res-asset').innerText = parsed.asset;
                    document.getElementById('res-entry').innerText = isW ? '--' : parsed.entry;
                    document.getElementById('res-sl').innerText = isW ? '--' : parsed.sl;
                    document.getElementById('res-tp').innerText = isW ? '--' : parsed.tp;
                    document.getElementById('res-lot').innerText = isW ? '--' : parsed.lots;
                    document.getElementById('res-logic').innerText = parsed.logic;
                    
                    document.getElementById('result-screen').classList.remove('hidden');
                } catch (e) {
                    alert("SCAN FAILED: Check clarity of Y-Axis labels.");
                } finally {
                    state.isSyncing = false;
                    btn.innerText = "Execute Logical Scan";
                }
            }
        };

        window.onload = () => {
            if(localStorage.getItem('ob_k')) document.getElementById('key').value = localStorage.getItem('ob_k');
            if(localStorage.getItem('ob_b')) document.getElementById('bal').value = localStorage.getItem('ob_b');
            if(localStorage.getItem('ob_r')) document.getElementById('risk').value = localStorage.getItem('ob_r');
        };
    </script>
</body>
</html>
