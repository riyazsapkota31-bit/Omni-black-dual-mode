<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | SOVEREIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-glow { text-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
        .active-glow { border-color: #00f2ff !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        html, body { overscroll-behavior-y: none; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-cyan-400 neon-glow uppercase leading-none">OMNI—DUAL</h1>
            <p class="text-[8px] font-bold text-white/40 tracking-[0.3em] uppercase mt-2">V100.2 | 8-CORE AGGREGATOR</p>
        </div>
        <button onclick="ui.toggleSettings()" class="p-4 glass rounded-2xl active:scale-95 transition-transform">⚙️</button>
    </div>

    <div class="flex gap-2 p-1 glass rounded-[28px] mb-8 relative z-10">
        <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-4 rounded-[25px] text-[10px] font-black uppercase tracking-widest bg-cyan-500 text-black shadow-[0_0_20px_rgba(6,182,212,0.5)] transition-all">Scalping</button>
        <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-4 rounded-[25px] text-[10px] font-black uppercase tracking-widest text-white/30 transition-all bg-white/5 hover:bg-white/10">Day Trading</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div id="box0" onclick="ui.trigger(0)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/10 transition-all">
            <input type="file" id="f0" class="hidden" accept="image/*" onchange="engine.stage(0)">
            <span id="l0" class="text-[9px] font-bold text-white/30 uppercase tracking-widest text-center px-2">1. HTF (1H/15M)</span>
            <span id="ok0" class="hidden text-cyan-400 text-4xl font-black">✓</span>
        </div>
        <div id="box1" onclick="ui.trigger(1)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/10 transition-all">
            <input type="file" id="f1" class="hidden" accept="image/*" onchange="engine.stage(1)">
            <span id="l1" class="text-[9px] font-bold text-white/30 uppercase tracking-widest text-center px-2">2. MTF (15M/5M)</span>
            <span id="ok1" class="hidden text-cyan-400 text-4xl font-black">✓</span>
        </div>
        <div id="box2" onclick="ui.trigger(2)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/10 transition-all">
            <input type="file" id="f2" class="hidden" accept="image/*" onchange="engine.stage(2)">
            <span id="l2" class="text-[9px] font-bold text-white/30 uppercase tracking-widest text-center px-2">3. LTF TRIGGER</span>
            <span id="ok2" class="hidden text-cyan-400 text-4xl font-black">✓</span>
        </div>
        <div id="box3" onclick="ui.trigger(3)" class="aspect-square glass rounded-[40px] flex flex-col items-center justify-center relative border-2 border-dashed border-white/10 transition-all">
            <input type="file" id="f3" class="hidden" accept="image/*" onchange="engine.stage(3)">
            <span id="l3" class="text-[9px] font-bold text-white/30 uppercase tracking-widest text-center px-2">4. DXY INDEX</span>
            <span id="ok3" class="hidden text-cyan-400 text-4xl font-black">✓</span>
        </div>
    </div>

    <button id="igniteBtn" onclick="engine.ignite()" class="w-full py-6 rounded-[35px] bg-white text-black font-black text-[12px] uppercase tracking-[0.3em] active:scale-95 transition-transform shadow-xl">Execute Surgical Scan</button>

    <div id="result-screen" class="fixed inset-0 bg-[#050505] z-[80] p-8 hidden flex-col overflow-y-auto">
        <button onclick="document.getElementById('result-screen').classList.add('hidden')" class="mb-8 text-[9px] font-black text-white/40 uppercase tracking-widest self-start p-2">← Return</button>
        <div class="text-center mb-10 mt-4">
            <h2 id="res-bias" class="text-[100px] font-black italic leading-none tracking-tighter">--</h2>
            <div class="flex justify-center gap-3 mt-6">
                <span id="res-type" class="glass px-5 py-2.5 rounded-full text-[9px] font-black text-cyan-400 uppercase tracking-[0.2em]">--</span>
                <span id="res-asset" class="glass px-5 py-2.5 rounded-full text-[9px] font-black text-white/80 uppercase tracking-[0.2em]">--</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="glass p-6 rounded-[35px] text-center border-t-2 border-t-white/10">
                <p class="text-[8px] text-white/30 mb-2 uppercase font-black">Entry</p>
                <p id="res-entry" class="text-2xl font-black">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center border-t-2 border-t-cyan-500/30">
                <p class="text-[8px] text-cyan-400/50 mb-2 uppercase font-black">Lot Size</p>
                <p id="res-lot" class="text-2xl font-black text-cyan-400">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center border-t-2 border-t-red-500/30">
                <p class="text-[8px] text-red-400/50 mb-2 uppercase font-black">Stop Loss</p>
                <p id="res-sl" class="text-2xl font-black text-red-500">--</p>
            </div>
            <div class="glass p-6 rounded-[35px] text-center border-t-2 border-t-emerald-500/30">
                <p class="text-[8px] text-emerald-400/50 mb-2 uppercase font-black">Take Profit</p>
                <p id="res-tp" class="text-2xl font-black text-emerald-400">--</p>
            </div>
        </div>
        <div class="glass p-8 rounded-[40px] border-white/5 mt-auto mb-4">
            <p id="res-logic" class="text-[12px] leading-relaxed text-white/80 italic text-center"></p>
        </div>
    </div>

    <div id="settings" class="fixed inset-0 bg-[#080808] z-[100] p-10 hidden flex-col justify-center backdrop-blur-2xl">
        <div class="max-w-md mx-auto w-full">
            <h3 class="text-3xl font-black italic mb-2 uppercase text-cyan-400 tracking-tighter">Hardware Interface</h3>
            <p class="text-[8px] text-white/40 uppercase tracking-[0.4em] mb-12">Model Locked: Gemini 2.5 Flash</p>
            <div class="space-y-6">
                <div class="relative">
                    <p class="text-[9px] font-black text-cyan-500 uppercase mb-3 ml-2 tracking-widest">API Key</p>
                    <input id="key" type="password" placeholder="••••••••••••••••" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl text-[12px] outline-none focus:border-cyan-500 text-white font-mono">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <p class="text-[9px] font-black text-white/40 uppercase mb-3 ml-2 tracking-widest">Balance ($)</p>
                        <input id="bal" type="number" placeholder="0.00" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl text-[12px] outline-none text-white font-mono">
                    </div>
                    <div class="w-1/3">
                        <p class="text-[9px] font-black text-white/40 uppercase mb-3 ml-2 tracking-widest">Risk %</p>
                        <input id="risk" type="number" placeholder="1.0" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl text-[12px] outline-none text-white font-mono">
                    </div>
                </div>
            </div>
            <button id="saveBtn" onclick="ui.save()" class="w-full py-6 bg-cyan-500 text-black font-black rounded-full mt-14 text-[11px] uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-all">Lock Configuration</button>
            <button onclick="ui.toggleSettings()" class="w-full mt-6 py-4 text-[9px] font-black text-white/30 uppercase tracking-widest active:scale-95">Abort Setup</button>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
