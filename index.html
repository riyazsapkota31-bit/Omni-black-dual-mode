<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | V62.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-text { text-shadow: 0 0 15px rgba(0,242,255,0.6); }
        /* Solid black overlay to kill permeability */
        #settingsPanel { background-color: #000000 !important; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto flex flex-col min-h-screen">

    <div id="terminalContainer">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-4xl font-900 italic tracking-tighter neon-text text-cyan-400 leading-none uppercase">OMNI—DUAL</h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold mt-2">TERMINAL ACTIVE V62.6</p>
            </div>
            <button onclick="toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div id="c0" onclick="injectGallery(0)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative">
                <input type="file" id="f0" hidden onchange="handleFile(0)">
                <div id="status0" class="text-[10px] font-black opacity-20">1H BIAS</div>
                <div id="tick0" class="hidden text-cyan-400">✓</div>
            </div>
            <div id="c1" onclick="injectGallery(1)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative">
                <input type="file" id="f1" hidden onchange="handleFile(1)">
                <div id="status1" class="text-[10px] font-black opacity-20">15M STRUCT</div>
                <div id="tick1" class="hidden text-cyan-400">✓</div>
            </div>
            <div id="c2" onclick="injectGallery(2)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative">
                <input type="file" id="f2" hidden onchange="handleFile(2)">
                <div id="status2" class="text-[10px] font-black opacity-20">1M TRIGGER</div>
                <div id="tick2" class="hidden text-cyan-400">✓</div>
            </div>
            <div id="c3" onclick="injectGallery(3)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative">
                <input type="file" id="f3" hidden onchange="handleFile(3)">
                <div id="status3" class="text-[10px] font-black opacity-20">DXY DATA</div>
                <div id="tick3" class="hidden text-cyan-400">✓</div>
            </div>
        </div>

        <button id="goBtn" onclick="runNeuralScan()" class="w-full bg-white text-black font-900 py-6 rounded-[32px] uppercase tracking-[0.3em] text-[11px] mb-10">Execute Command</button>
    </div>

    <div id="settingsPanel" class="fixed inset-0 z-[9999] flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-xs text-center">
            <h3 class="text-3xl font-900 italic tracking-tighter mb-12 uppercase text-cyan-400">CORE SYNC</h3>
            <div class="space-y-4">
                <input type="password" id="apiKeyIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-cyan-400 text-center font-black outline-none" placeholder="API_KEY">
                <div class="flex gap-4">
                    <input type="number" id="balIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center font-black outline-none" placeholder="BAL $">
                    <input type="number" id="riskIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center font-black outline-none" placeholder="RISK %">
                </div>
                <button onclick="saveCore()" class="w-full bg-white text-black font-900 py-6 rounded-2xl text-[10px] uppercase tracking-[0.4em] mt-8">Sync Core</button>
                <p onclick="toggleSettings()" class="text-[9px] uppercase tracking-widest text-white/20 mt-8 cursor-pointer">Return to Terminal</p>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
