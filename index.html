<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | NEURAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-link { border-color: #00f2ff; box-shadow: 0 0 20px rgba(0,242,255,0.15), inset 0 0 15px rgba(0,242,255,0.1); }
        .neon-text { text-shadow: 0 0 15px rgba(0,242,255,0.5); }
        input[type="checkbox"]:checked ~ .dot { transform: translateX(1.5rem); background-color: #00f2ff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto no-scrollbar overflow-y-auto h-screen">

    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-4xl font-900 italic tracking-tighter neon-text text-cyan-400 leading-none">OMNI—DUAL</h1>
            <div class="flex items-center gap-2 mt-2">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold">Terminal Active V62.6</span>
            </div>
        </div>
        <button onclick="toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center active:scale-90 transition-transform">
            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
        </button>
    </div>

    <div class="glass p-6 rounded-[32px] mb-8 flex items-center justify-between border-white/5">
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Aggressive Scalp</span>
        <label class="flex items-center cursor-pointer">
            <div class="relative">
                <input type="checkbox" id="mode-input" class="sr-only">
                <div class="block bg-white/5 w-14 h-8 rounded-full border border-white/10"></div>
                <div class="dot absolute left-1 top-1 bg-white/20 w-6 h-6 rounded-full transition-all duration-300"></div>
            </div>
        </label>
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="c0" onclick="openGallery(0)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f0" accept="image/*" hidden onchange="handleInjectedFile(0)">
            <svg id="i0" class="w-6 h-6 mb-2 opacity-20 group-hover:text-cyan-400 group-hover:opacity-100 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path></svg>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">1H Bias</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500">
        </div>
        <div id="c1" onclick="openGallery(1)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f1" accept="image/*" hidden onchange="handleInjectedFile(1)">
            <svg id="i1" class="w-6 h-6 mb-2 opacity-20 group-hover:text-cyan-400 group-hover:opacity-100 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">15M Struct</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500">
        </div>
        <div id="c2" onclick="openGallery(2)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f2" accept="image/*" hidden onchange="handleInjectedFile(2)">
            <svg id="i2" class="w-6 h-6 mb-2 opacity-20 group-hover:text-cyan-400 group-hover:opacity-100 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">1M Trigger</span>
            <img id="p2" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500">
        </div>
        <div id="c3" onclick="openGallery(3)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group border-dashed border-cyan-500/20">
            <input type="file" id="f3" accept="image/*" hidden onchange="handleInjectedFile(3)">
            <svg id="i3" class="w-6 h-6 mb-2 text-cyan-400/30 group-hover:text-cyan-400 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            <span class="text-[10px] font-black text-cyan-400/30 uppercase tracking-widest">DXY Data</span>
            <img id="p3" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500">
        </div>
    </div>

    <button id="goBtn" onclick="runNeuralScan()" class="w-full bg-white text-black font-900 py-6 rounded-[32px] uppercase tracking-[0.3em] text-[11px] shadow-[0_0_40px_rgba(255,255,255,0.12)] active:scale-95 transition-all mb-12">Execute Command</button>

    <div id="outPanel" class="hidden pb-24 text-center">
        <h2 id="biasTxt" class="text-[130px] font-900 italic tracking-tighter leading-none mb-6">--</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-6 rounded-[32px]"><p class="text-[9px] text-white/30 uppercase font-black mb-1">Entry</p><span id="entVal" class="text-2xl font-900 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-[32px]"><p class="text-[9px] text-white/30 uppercase font-black mb-1">Lot Size</p><span id="lotVal" class="text-2xl font-900 text-cyan-400 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-[32px] border-rose-500/10"><p class="text-[9px] text-rose-500/40 uppercase font-black mb-1">Stop Loss</p><span id="slVal" class="text-2xl font-900 text-rose-500 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-[32px] border-emerald-500/10"><p class="text-[9px] text-emerald-400/40 uppercase font-black mb-1">Take Profit</p><span id="tpVal" class="text-2xl font-900 text-emerald-400 tracking-tighter">--</span></div>
        </div>
        <div id="logicSummary" class="glass p-8 rounded-[40px] text-[12px] leading-relaxed text-white/50 uppercase italic font-medium tracking-tight"></div>
    </div>

    <div id="settingsPanel" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-8 hidden">
        <div class="w-full text-center">
            <h3 class="text-3xl font-900 italic tracking-tighter mb-16 uppercase neon-text text-cyan-400">Hardware Link</h3>
            <div class="space-y-4 max-w-xs mx-auto">
                <input type="password" id="apiKeyIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-cyan-400 text-center tracking-widest focus:border-cyan-400/50 outline-none" placeholder="NEURAL_KEY">
                <div class="flex gap-4">
                    <input type="number" id="balanceIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center text-sm outline-none" placeholder="BAL $">
                    <input type="number" id="riskIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-6 text-center text-sm outline-none" placeholder="RISK %">
                </div>
                <button onclick="saveCoreSettings()" class="w-full bg-white text-black font-900 py-6 rounded-2xl text-[11px] uppercase tracking-[0.4em] mt-8 shadow-xl shadow-white/5">Sync Core</button>
                <button onclick="toggleSettings()" class="text-[10px] uppercase tracking-widest text-white/20 mt-6 block mx-auto font-black hover:text-white transition-colors">Abort</button>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        var files = [null, null, null, null];
        function openGallery(i) { document.getElementById(`f${i}`).click(); }
        function handleInjectedFile(i) {
            const f = document.getElementById(`f${i}`).files[0];
            if(!f) return;
            files[i] = f;
            const r = new FileReader();
            r.onload = (e) => {
                const img = document.getElementById(`p${i}`);
                const card = document.getElementById(`c${i}`);
                const icon = document.getElementById(`i${i}`);
                img.src = e.target.result;
                img.classList.remove('opacity-0');
                card.classList.add('active-link');
                icon.classList.add('hidden');
            };
            r.readAsDataURL(f);
        }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveCoreSettings() {
            localStorage.setItem('omni_kIn', document.getElementById('apiKeyIn').value);
            localStorage.setItem('omni_bIn', document.getElementById('balanceIn').value);
            localStorage.setItem('omni_rIn', document.getElementById('riskIn').value);
            toggleSettings();
        }
    </script>
</body>
</html>
