<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—BLACK | SOVEREIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .active-ring { border: 2px solid #00f2ff !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-4xl font-900 italic tracking-tighter text-cyan-400 glow-text leading-none">OMNI—BLACK</h1>
            <p class="text-[8px] tracking-[0.3em] font-900 text-white/40 mt-2 uppercase">STABLE CORES: 2.5 FLASH / LITE</p> </div>
        <button onclick="ui.toggleSettings()" class="p-3 bg-white/5 rounded-2xl border border-white/10">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 14V3M1 14h6M9 8h6M17 14h6"/></svg>
        </button>
    </div>

    <div class="flex gap-2 bg-white/5 p-1 rounded-[24px] mb-8 border border-white/5">
        <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg">Scalping</button>
        <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest text-white/20">Day Trading</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="box0" onclick="ui.trigger(0)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f0" class="hidden" accept="image/*" onchange="engine.stage(0)">
            <span id="l0" class="text-[10px] font-900 text-cyan-400/40 uppercase tracking-widest">HTF Bias</span>
            <span id="ok0" class="hidden text-cyan-400">✓</span>
        </div>
        <div id="box1" onclick="ui.trigger(1)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f1" class="hidden" accept="image/*" onchange="engine.stage(1)">
            <span id="l1" class="text-[10px] font-900 text-cyan-400/40 uppercase tracking-widest">M15 Structure</span>
            <span id="ok1" class="hidden text-cyan-400">✓</span>
        </div>
        <div id="box2" onclick="ui.trigger(2)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f2" class="hidden" accept="image/*" onchange="engine.stage(2)">
            <span id="l2" class="text-[10px] font-900 text-cyan-400/40 uppercase tracking-widest">Trigger</span>
            <span id="ok2" class="hidden text-cyan-400">✓</span>
        </div>
        <div id="box3" onclick="ui.trigger(3)" class="aspect-square rounded-[40px] border-2 border-dashed border-cyan-500/20 flex flex-col items-center justify-center bg-white/5 relative">
            <input type="file" id="f3" class="hidden" accept="image/*" onchange="engine.stage(3)">
            <span id="l3" class="text-[10px] font-900 text-cyan-400/40 uppercase tracking-widest">DXY/News</span>
            <span id="ok3" class="hidden text-cyan-400">✓</span>
        </div>
    </div>

    <button id="igniteBtn" onclick="engine.ignite()" class="w-full py-6 rounded-[35px] bg-white text-black font-900 text-[11px] uppercase tracking-[0.3em] shadow-lg active:scale-95 transition-transform">
        Execute Command
    </button>

    <div id="settings" class="fixed inset-0 bg-black/95 z-50 p-8 hidden">
        <h2 class="text-2xl font-900 uppercase italic mb-8">Core Config</h2>
        <input id="key" type="password" placeholder="GEMINI API KEY" class="w-full bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 text-[10px]">
        <div class="flex gap-4 mb-4">
            <input id="bal" type="number" placeholder="BALANCE" class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px]">
            <input id="risk" type="number" placeholder="RISK %" class="w-24 bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px]">
        </div>
        <button onclick="ui.save()" class="w-full py-4 bg-cyan-500 text-black font-900 rounded-2xl uppercase text-[10px]">Save & Lock</button>
    </div>

    <div id="result-screen" class="fixed inset-0 bg-black z-[60] p-6 hidden overflow-y-auto hide-scroll">
        <button onclick="document.getElementById('result-screen').classList.add('hidden')" class="mb-8 p-3 bg-white/10 rounded-2xl uppercase text-[8px] font-900 tracking-widest">← Back</button>
        
        <div class="text-center mb-10">
            <h3 id="res-bias" class="text-[110px] font-900 italic leading-none tracking-tighter uppercase">--</h3>
            <p id="res-asset" class="text-[12px] font-900 text-white/40 tracking-[0.5em] uppercase">Surgical Engine</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Entry</p>
                <p id="res-entry" class="text-xl font-900 leading-none">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Lot Size</p>
                <p id="res-lot" class="text-xl font-900 leading-none text-cyan-400">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Stop Loss</p>
                <p id="res-sl" class="text-xl font-900 leading-none text-red-500">--</p>
            </div>
            <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                <p class="text-[8px] text-white/30 font-900 mb-2 uppercase">Take Profit</p>
                <p id="res-tp" class="text-xl font-900 leading-none text-emerald-400">--</p>
            </div>
        </div>

        <div class="bg-white/5 p-8 rounded-[40px] border border-white/5">
            <p id="res-logic" class="text-[11px] leading-relaxed font-400 text-white/70 italic"></p>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
