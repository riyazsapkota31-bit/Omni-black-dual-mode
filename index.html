<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI—BLACK | NEURAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #030303; color: white; font-family: 'Inter', sans-serif; }
        .neon-border { border: 1px solid rgba(0,242,255,0.1); transition: 0.2s; }
        .neon-border:hover { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        .active-glow { box-shadow: inset 0 0 20px rgba(0,242,255,0.05); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-cyan-400 tracking-tighter">OMNI—BLACK</h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-white/30 font-bold">V62.6 High-Speed Core</p>
        </div>
        <div class="flex gap-2">
            <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mt-1"></div>
            <span class="text-[9px] font-black text-white/40 uppercase">System Ready</span>
        </div>
    </header>

    <div class="bg-white/5 p-4 rounded-2xl mb-6 border border-white/10 flex items-center justify-between active-glow">
        <span class="text-[10px] font-black uppercase text-white/40">Aggressive Scalp</span>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="mode-input" class="sr-only peer">
            <div class="w-10 h-5 bg-white/10 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-cyan-500"></div>
        </label>
        <span class="text-[10px] font-black uppercase text-white/40">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div onclick="document.getElementById('f1').click()" class="neon-border h-28 rounded-xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f1" hidden onchange="handleUpload(event, 0)">
            <span class="text-[9px] font-black text-white/20 uppercase">BOX 01</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f2').click()" class="neon-border h-28 rounded-xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f2" hidden onchange="handleUpload(event, 1)">
            <span class="text-[9px] font-black text-white/20 uppercase">BOX 02</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f3').click()" class="neon-border h-28 rounded-xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f3" hidden onchange="handleUpload(event, 2)">
            <span class="text-[9px] font-black text-white/20 uppercase">BOX 03</span>
            <img id="p2" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f4').click()" class="neon-border h-28 rounded-xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden border-dashed border-cyan-500/20">
            <input type="file" id="f4" hidden onchange="handleUpload(event, 3)">
            <span class="text-[9px] font-black text-cyan-400/50 uppercase">DXY DATA</span>
            <img id="p3" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs hover:bg-cyan-400 transition-all">Execute Neural Command</button>

    <div id="outPanel" class="hidden mt-8">
        <div class="text-center mb-6">
            <h2 id="biasTxt" class="text-7xl font-black italic tracking-tighter leading-none">--</h2>
            <p class="text-[9px] text-white/20 uppercase tracking-[0.4em] mt-2 font-bold">Safe Trade Logic Analysis</p>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                <span class="text-[8px] text-white/30 uppercase block font-black mb-1">Entry Point</span>
                <span id="entVal" class="text-lg font-black text-white">--</span>
            </div>
            <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                <span class="text-[8px] text-white/30 uppercase block font-black mb-1">Lot / Quantity</span>
                <span id="lotVal" class="text-lg font-black text-cyan-400">--</span>
            </div>
            <div class="bg-white/5 p-4 rounded-xl border border-rose-500/10">
                <span class="text-[8px] text-rose-500/50 uppercase block font-black mb-1">Stop Loss</span>
                <span id="slVal" class="text-lg font-black text-rose-500">--</span>
            </div>
            <div class="bg-white/5 p-4 rounded-xl border border-emerald-500/10">
                <span class="text-[8px] text-emerald-400/50 uppercase block font-black mb-1">Take Profit</span>
                <span id="tpVal" class="text-lg font-black text-emerald-400">--</span>
            </div>
        </div>

        <div id="logicSummary" class="bg-white/5 p-5 rounded-2xl border border-white/5 text-white/70"></div>
    </div>

    <script src="strategies.js"></script>
    <script>
        var files = [null, null, null, null];
        function handleUpload(e, i) {
            const f = e.target.files[0];
            if(!f) return;
            files[i] = f;
            const r = new FileReader();
            r.onload = (ev) => {
                const img = document.getElementById(`p${i}`);
                img.src = ev.target.result;
                img.classList.remove('hidden');
            };
            r.readAsDataURL(f);
        }
    </script>
</body>
</html>
