<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-SIGNAL Backtest | Historical Performance Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05080f;
            color: #e8edf5;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #6366f1; margin-bottom: 10px; }
        .sub { color: #8a99b0; margin-bottom: 30px; font-size: 14px; }
        .control-panel {
            background: #0f1522;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        label { font-size: 12px; color: #8a99b0; }
        select, input {
            background: #1a2030;
            border: 1px solid #2a2e38;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            background: #6366f1;
            color: white;

        }

            background: #0f1522;
            border: 1px solid rgba(255,255,255,0.1);

            padding: 20px;

        .stat-grid {
            display: grid;

            margin-top: 20px;
            border-top: 1px solid #2a2e38;
            padding-top: 20px;
        }

            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a2030;
        }
        .buy { color: #00ff88; }
        .sell { color: #ff4466; }

        .loading { text-align: center; padding: 40px; }
        .error { color: #ff4466; }
        hr { border-color: #2a2e38; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔬 OMNI-SIGNAL BACKTEST</h1>
    <div class="sub">Test your strategy on historical data | No installation needed</div>

    <div class="control-panel">
        <div class="row">
            <div>
                <label>📊 SYMBOL</label><br>
                <select id="symbol">
                    <option value="GC=F">🪙 XAUUSD (Gold)</option>
                    <option value="SI=F">🥈 XAGUSD (Silver)</option>
                    <option value="EURUSD=X">💶 EUR/USD</option>
                    <option value="GBPUSD=X">💷 GBP/USD</option>
                    <option value="BTC-USD">₿ BTC/USD</option>
                    <option value="ETH-USD">Ξ ETH/USD</option>
                </select>
            </div>
            <div>
                <label>📅 START DATE</label><br>
                <input type="date" id="startDate" value="2025-04-01">
            </div>
            <div>
                <label>📅 END DATE</label><br>
                <input type="date" id="endDate" value="2025-05-01">
            </div>
            <div>
                <label>⏱️ INTERVAL</label><br>
                <select id="interval">
                    <option value="5m">5 Minutes (Scalp)</option>
                    <option value="15m">15 Minutes</option>
                    <option value="1h">1 Hour</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div>
                <label>💰 BALANCE</label><br>
                <input type="number" id="balance" value="7200">
            </div>
            <div>
                <label>⚠️ RISK %</label><br>
                <input type="number" id="riskPercent" value="1.0" step="0.1">
            </div>
            <div>
                <label>🎯 MIN RR</label><br>
                <input type="number" id="minRR" value="2.0" step="0.5">
            </div>
            <div style="margin-top: 20px;">
                <button onclick="runBacktest()">🚀 RUN BACKTEST</button>
            </div>
        </div>
    </div>

    <div id="results" class="results">
        <div class="loading">Click RUN BACKTEST to start</div>
    </div>
</div>

<script>
    // ========== YOUR FULL STRATEGY DETECTION FUNCTIONS ==========
    
    function getKeyLevels(candles, currentPrice) {
        const levels = [];
        const dayCandles = candles.slice(-288);
        if (dayCandles.length > 0) {
            levels.push({ price: Math.max(...dayCandles.map(c => c.high)), type: 'RESISTANCE', strength: 'MAJOR' });
            levels.push({ price: Math.min(...dayCandles.map(c => c.low)), type: 'SUPPORT', strength: 'MAJOR' });
        }
        if (candles.length >= 1440) {
            const weekCandles = candles.slice(-1440);
            levels.push({ price: Math.max(...weekCandles.map(c => c.high)), type: 'RESISTANCE', strength: 'MAJOR' });
            levels.push({ price: Math.min(...weekCandles.map(c => c.low)), type: 'SUPPORT', strength: 'MAJOR' });
        }
        for (let i = 15; i < candles.length - 15; i++) {
            const isSwingHigh = candles[i].high > candles[i-5].high && candles[i].high > candles[i-10].high &&
                                candles[i].high > candles[i+5].high && candles[i].high > candles[i+10].high;
            const isSwingLow = candles[i].low < candles[i-5].low && candles[i].low < candles[i-10].low &&
                               candles[i].low < candles[i+5].low && candles[i].low < candles[i+10].low;
            if (isSwingHigh) levels.push({ price: candles[i].high, type: 'RESISTANCE', strength: 'MINOR' });
            if (isSwingLow) levels.push({ price: candles[i].low, type: 'SUPPORT', strength: 'MINOR' });
        }
        const roundNumber = Math.round(currentPrice / 10) * 10;
        levels.push({ price: roundNumber, type: 'ROUND_NUMBER', strength: 'ROUND' });
        const unique = [];
        for (const level of levels) {
            let duplicate = false;
            for (const existing of unique) {
                if (Math.abs(existing.price - level.price) / level.price < 0.0005) {
                    duplicate = true;
                    break;
                }
            }
            if (!duplicate) unique.push(level);
        }
        return unique;
    }

    function isAtSupport(price, levels) {
        for (const level of levels) {
            if (level.type === 'SUPPORT' && Math.abs(price - level.price) / price < 0.0005) {
                return { atLevel: true, level: level.price, strength: level.strength };
            }
        }
        return { atLevel: false };
    }

    function isAtResistance(price, levels) {
        for (const level of levels) {
            if (level.type === 'RESISTANCE' && Math.abs(price - level.price) / price < 0.0005) {
                return { atLevel: true, level: level.price, strength: level.strength };
            }
        }
        return { atLevel: false };
    }

    function detectBOS(candles) {
        if (candles.length < 30) return null;
        const highs = candles.map(c => c.high);
        const lows = candles.map(c => c.low);
        const recentHigh = Math.max(...highs.slice(-10));
        const previousHigh = Math.max(...highs.slice(-20, -10));
        const recentLow = Math.min(...lows.slice(-10));
        const previousLow = Math.min(...lows.slice(-20, -10));
        if (recentHigh > previousHigh) return { type: 'BULLISH', level: previousHigh };
        if (recentLow < previousLow) return { type: 'BEARISH', level: previousLow };
        return null;
    }

    function detectFVG(candles) {
        if (candles.length < 3) return null;
        const c1 = candles[candles.length - 3];
        const c2 = candles[candles.length - 2];
        const c3 = candles[candles.length - 1];
        if (c1.high < c3.low) return { type: 'BULLISH', level: c1.high, level2: c3.low };
        if (c3.high < c1.low) return { type: 'BEARISH', level: c3.high, level2: c1.low };
        return null;
    }

    function detectOrderBlock(candles) {
        if (candles.length < 3) return null;
        const prev = candles[candles.length - 2];
        const last = candles[candles.length - 1];
        if (prev.close < prev.open && last.close > last.open && last.close > prev.high) {
            return { type: 'BULLISH', level: prev.low };
        }
        if (prev.close > prev.open && last.close < last.open && last.close < prev.low) {
            return { type: 'BEARISH', level: prev.high };
        }
        return null;
    }

    function detectLiquiditySweep(candles, level) {
        if (candles.length < 5) return false;
        const last = candles[candles.length - 1];
        if (last.low < level && last.close > level && last.close > last.open) return true;
        if (last.high > level && last.close < level && last.close < last.open) return true;
        return false;
    }

    function checkRetracement(candles, level, bias) {
        if (candles.length < 15) return false;
        const recentCandles = candles.slice(-15);
        let sweepIndex = -1;
        for (let i = recentCandles.length - 1; i >= 0; i--) {
            if (bias === 'BUY' && recentCandles[i].low <= level) { sweepIndex = i; break; }
            if (bias === 'SELL' && recentCandles[i].high >= level) { sweepIndex = i; break; }
        }
        if (sweepIndex === -1 || sweepIndex >= recentCandles.length - 4) return false;
        const afterSweep = recentCandles.slice(sweepIndex + 1);
        if (afterSweep.length < 3) return false;
        if (bias === 'BUY') {
            let bullishCount = 0;
            for (let i = 0; i < afterSweep.length; i++) {
                if (afterSweep[i].close > afterSweep[i].open) bullishCount++;
                else break;
            }
            const closedAbove = afterSweep[afterSweep.length-1].close > level;
            const priceMovedUp = (afterSweep[afterSweep.length-1].close - level) / level > 0.0015;
            const lowestAfter = Math.min(...afterSweep.map(c => c.low));
            const noNewLow = lowestAfter > level - (level * 0.0005);
            return bullishCount >= 2 && closedAbove && priceMovedUp && noNewLow;
        } else {
            let bearishCount = 0;
            for (let i = 0; i < afterSweep.length; i++) {
                if (afterSweep[i].close < afterSweep[i].open) bearishCount++;
                else break;
            }
            const closedBelow = afterSweep[afterSweep.length-1].close < level;
            const priceMovedDown = (level - afterSweep[afterSweep.length-1].close) / level > 0.0015;
            const highestAfter = Math.max(...afterSweep.map(c => c.high));
            const noNewHigh = highestAfter < level + (level * 0.0005);
            return bearishCount >= 2 && closedBelow && priceMovedDown && noNewHigh;
        }
    }

    function detectMSS(candles, bias) {
        if (candles.length < 20) return { detected: false, strength: 0 };
        const recentCandles = candles.slice(-18);
        let lastSwingHigh = -Infinity, lastSwingLow = Infinity, swingIndex = -1;
        for (let i = 4; i < recentCandles.length - 4; i++) {
            const isSwingHigh = recentCandles[i].high > recentCandles[i-1].high && recentCandles[i].high > recentCandles[i-2].high &&
                                recentCandles[i].high > recentCandles[i+1].high && recentCandles[i].high > recentCandles[i+2].high;
            const isSwingLow = recentCandles[i].low < recentCandles[i-1].low && recentCandles[i].low < recentCandles[i-2].low &&
                               recentCandles[i].low < recentCandles[i+1].low && recentCandles[i].low < recentCandles[i+2].low;
            if (isSwingHigh && recentCandles[i].high > lastSwingHigh) { lastSwingHigh = recentCandles[i].high; swingIndex = i; }
            if (isSwingLow && recentCandles[i].low < lastSwingLow) { lastSwingLow = recentCandles[i].low; swingIndex = i; }
        }
        if (swingIndex === -1 || swingIndex >= recentCandles.length - 3) return { detected: false, strength: 0 };
        const candlesAfter = recentCandles.slice(swingIndex + 1);
        if (candlesAfter.length < 3) return { detected: false, strength: 0 };
        if (bias === 'BUY') {
            const higherLow = Math.min(...candlesAfter.map(c => c.low)) > lastSwingLow;
            const higherHigh = Math.max(...candlesAfter.map(c => c.high)) > lastSwingHigh;
            if (higherLow && higherHigh) return { detected: true, strength: 80 };
        } else {
            const lowerHigh = Math.max(...candlesAfter.map(c => c.high)) < lastSwingHigh;
            const lowerLow = Math.min(...candlesAfter.map(c => c.low)) < lastSwingLow;
            if (lowerHigh && lowerLow) return { detected: true, strength: 80 };
        }
        return { detected: false, strength: 0 };
    }

    function detectCandlePattern(candles, bias) {
        if (candles.length < 2) return { detected: false, pattern: null };
        const last = candles[candles.length - 1];
        const prev = candles[candles.length - 2];
        if (bias === 'BUY') {
            const bullishEngulfing = prev.close < prev.open && last.close > last.open && last.close > prev.open && last.open < prev.close;
            if (bullishEngulfing) return { detected: true, pattern: 'BULLISH_ENGULFING' };
            const bodySize = Math.abs(last.close - last.open);
            const lowerWick = Math.min(last.open, last.close) - last.low;
            if (lowerWick > bodySize * 2 && last.close > last.open) return { detected: true, pattern: 'BULLISH_PINBAR' };
        } else {
            const bearishEngulfing = prev.close > prev.open && last.close < last.open && last.close < prev.open && last.open > prev.close;
            if (bearishEngulfing) return { detected: true, pattern: 'BEARISH_ENGULFING' };
            const bodySize = Math.abs(last.close - last.open);
            const upperWick = last.high - Math.max(last.open, last.close);
            if (upperWick > bodySize * 2 && last.close < last.open) return { detected: true, pattern: 'BEARISH_PINBAR' };
        }
        return { detected: false, pattern: null };
    }

    function calculateSignalScore(factors) {
        let score = 0;
        let positionMultiplier = 1.0;
        let expectedWinRate = 50;
        const hasBOS = factors.bos;
        const hasKeyLevel = factors.atLevel;
        const hasRetrace = factors.retraced;
        const hasSweep = factors.sweep;
        if (!hasBOS || !hasKeyLevel) {
            return { passed: false, grade: 'REJECT', positionMultiplier: 0, expectedWinRate: 35 };
        }
        if (hasRetrace && hasSweep) {
            score = 50;
        } else if (hasRetrace || hasSweep) {
            score = 35;
            expectedWinRate = 55;
        } else {
            return { passed: false, grade: 'REJECT', positionMultiplier: 0, expectedWinRate: 35 };
        }
        const levelStrength = factors.levelStrength || 'MINOR';
        if (levelStrength === 'MAJOR') {
            score += 25;
            positionMultiplier = 1.0;
            expectedWinRate = 78;
        } else if (levelStrength === 'MINOR') {
            score += 0;
            positionMultiplier = 0.7;
            expectedWinRate = 62;
        } else if (levelStrength === 'ROUND') {
            score += 10;
            positionMultiplier = 0.85;
            expectedWinRate = 70;
        }
        if (factors.mss && factors.mss.detected) {
            score += factors.mss.strength >= 80 ? 15 : 8;
            expectedWinRate = Math.min(85, expectedWinRate + (factors.mss.strength >= 80 ? 8 : 4));
        }
        if (factors.candlePattern && factors.candlePattern.detected) {
            score += 10;
            expectedWinRate = Math.min(85, expectedWinRate + 5);
        }
        if (factors.fvg) {
            score += 8;
            expectedWinRate = Math.min(85, expectedWinRate + 3);
        }
        if (factors.ob) {
            score += 5;
            expectedWinRate = Math.min(85, expectedWinRate + 2);
        }
        if (factors.sessionBoost && levelStrength !== 'MINOR') {
            score += 5;
            expectedWinRate = Math.min(85, expectedWinRate + 2);
        }
        score = Math.min(100, score);
        expectedWinRate = Math.min(85, expectedWinRate);
        let grade = 'B';
        let passed = true;
        if (expectedWinRate >= 75) { grade = 'A+'; positionMultiplier = 1.0; }
        else if (expectedWinRate >= 70) { grade = 'A'; positionMultiplier = 0.95; }
        else if (expectedWinRate >= 65) { grade = 'B+'; positionMultiplier = 0.85; }
        else if (expectedWinRate >= 60) { grade = 'B'; positionMultiplier = 0.7; passed = true; }
        else { passed = false; }
        return { score, grade, passed, positionMultiplier, expectedWinRate };
    }

    function analyzeSignal(prices, candles, assetConfig) {
        if (candles.length < 40) {
            return { bias: 'WAIT', confidence: 30, currentPrice: prices[prices.length-1] };
        }
        const curPrice = prices[prices.length-1];
        const keyLevels = getKeyLevels(candles, curPrice);
        const atSupport = isAtSupport(curPrice, keyLevels);
        const atResistance = isAtResistance(curPrice, keyLevels);
        const levelStrength = atSupport.atLevel ? atSupport.strength : (atResistance.atLevel ? atResistance.strength : null);
        const bos = detectBOS(candles);
        const fvg = detectFVG(candles);
        const ob = detectOrderBlock(candles);
        let bias = null;
        let targetLevel = null;
        let retraced = false;
        let sweep = false;
        let mss = { detected: false };
        let candlePattern = { detected: false };
        if (atSupport.atLevel) {
            bias = 'BUY';
            targetLevel = fvg ? (fvg.type === 'BULLISH' ? fvg.level2 : fvg.level) : (ob ? ob.level : null);
            if (targetLevel) {
                retraced = checkRetracement(candles, targetLevel, 'BUY');
                sweep = detectLiquiditySweep(candles, targetLevel);
            }
            mss = detectMSS(candles, 'BUY');
            candlePattern = detectCandlePattern(candles, 'BUY');
        } else if (atResistance.atLevel) {
            bias = 'SELL';
            targetLevel = fvg ? (fvg.type === 'BEARISH' ? fvg.level : fvg.level2) : (ob ? ob.level : null);
            if (targetLevel) {
                retraced = checkRetracement(candles, targetLevel, 'SELL');
                sweep = detectLiquiditySweep(candles, targetLevel);
            }
            mss = detectMSS(candles, 'SELL');
            candlePattern = detectCandlePattern(candles, 'SELL');
        }
        const scoreResult = calculateSignalScore({
            bos: !!(bos && ((bias === 'BUY' && bos.type === 'BULLISH') || (bias === 'SELL' && bos.type === 'BEARISH'))),
            atLevel: !!(atSupport.atLevel || atResistance.atLevel),
            retraced: retraced,
            sweep: sweep,
            levelStrength: levelStrength,
            mss: mss,
            candlePattern: candlePattern,
            fvg: !!fvg,
            ob: !!ob,
            sessionBoost: true
        });
        if (scoreResult.passed) {
            return {
                bias: bias,
                grade: scoreResult.grade,
                expectedWinRate: scoreResult.expectedWinRate,
                positionMultiplier: scoreResult.positionMultiplier,
                currentPrice: curPrice
            };
        }
        return { bias: 'WAIT', grade: 'REJECT', currentPrice: curPrice };
    }

    // ========== BACKTEST ENGINE ==========
    async function runBacktest() {
        const symbol = document.getElementById('symbol').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const interval = document.getElementById('interval').value;
        const initialBalance = parseFloat(document.getElementById('balance').value);
        const riskPercent = parseFloat(document.getElementById('riskPercent').value);
        const minRR = parseFloat(document.getElementById('minRR').value);
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loading">📊 Fetching historical data... Please wait (10-30 seconds)</div>';
        
        // Map interval to Yahoo format
        const intervalMap = { '5m': '5m', '15m': '15m', '1h': '1h' };
        const yahooInterval = intervalMap[interval];
        
        const startTimestamp = Math.floor(new Date(startDate).getTime() / 1000);
        const endTimestamp = Math.floor(new Date(endDate).getTime() / 1000);
      const url = `https://cors-anywhere.herokuapp.com/https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${startTimestamp}&period2=${endTimestamp}&interval=${yahooInterval}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.chart || !data.chart.result || !data.chart.result[0]) {
                throw new Error('No data available for this symbol/date range');
            }
            
            const result = data.chart.result[0];
            const timestamps = result.timestamp;
            const quotes = result.indicators.quote[0];
            
            const candles = [];
            for (let i = 0; i < timestamps.length; i++) {
                if (quotes.open[i] && quotes.high[i] && quotes.low[i] && quotes.close[i]) {
                    candles.push({
                        timestamp: timestamps[i],
                        open: quotes.open[i],
                        high: quotes.high[i],
                        low: quotes.low[i],
                        close: quotes.close[i]
                    });
                }
            }
            
            if (candles.length < 100) {
                resultsDiv.innerHTML = `<div class="error">❌ Only ${candles.length} candles found. Need at least 100. Try a longer date range.</div>`;
                return;
            }
            
            // Run backtest
            let balance = initialBalance;
            let trades = [];
            let openTrade = null;
            let signalsCount = 0;
            
            const assetConfig = {
                digits: symbol.includes('GC') ? 2 : (symbol.includes('BTC') ? 0 : 5),
                class: symbol.includes('GC') ? 'commodities' : (symbol.includes('BTC') ? 'crypto' : 'forex'),
                spread: symbol.includes('GC') ? 0.35 : (symbol.includes('BTC') ? 75 : 0.00016),
                minStopPips: symbol.includes('GC') ? 15 : (symbol.includes('BTC') ? 1000 : 15)
            };
            
            for (let i = 50; i < candles.length; i++) {
                const history = candles.slice(0, i + 1);
                const prices = history.map(c => c.close);
                const currentPrice = prices[prices.length - 1];
                
                // Check existing trade
                if (openTrade) {
                    let exited = false;
                    let exitPrice = null;
                    
                    for (let j = openTrade.entryIndex + 1; j <= i; j++) {
                        if (openTrade.bias === 'BUY') {
                            if (candles[j].high >= openTrade.takeProfit) {
                                exitPrice = openTrade.takeProfit;
                                exited = true;
                            } else if (candles[j].low <= openTrade.stopLoss) {
                                exitPrice = openTrade.stopLoss;
                                exited = true;
                            }
                        } else {
                            if (candles[j].low <= openTrade.takeProfit) {
                                exitPrice = openTrade.takeProfit;
                                exited = true;
                            } else if (candles[j].high >= openTrade.stopLoss) {
                                exitPrice = openTrade.stopLoss;
                                exited = true;
                            }
                        }
                        if (exited) break;
                    }
                    
                    if (exited) {
                        const pnlPercent = (openTrade.bias === 'BUY' 
                            ? (exitPrice - openTrade.entryPrice) / openTrade.entryPrice 
                            : (openTrade.entryPrice - exitPrice) / openTrade.entryPrice) * (balance * riskPercent / 100);
                        balance += pnlPercent;
                        trades.push({
                            ...openTrade,
                            exitPrice: exitPrice,
                            pnl: pnlPercent,
                            win: (openTrade.bias === 'BUY' && exitPrice >= openTrade.takeProfit) ||
                                  (openTrade.bias === 'SELL' && exitPrice <= openTrade.takeProfit)
                        });
                        openTrade = null;
                    }
                }
                
                // Look for new signal
                if (!openTrade && history.length >= 50) {
                    const signal = analyzeSignal(prices, history, assetConfig);
                    signalsCount++;
                    
                    if (signal.bias !== 'WAIT' && signal.grade !== 'REJECT') {
                        const stopDistance = assetConfig.minStopPips;
                        const stopLoss = signal.bias === 'BUY' 
                            ? currentPrice - stopDistance 
                            : currentPrice + stopDistance;
                        const risk = Math.abs(currentPrice - stopLoss);
                        const takeProfit = signal.bias === 'BUY'
                            ? currentPrice + (risk * minRR)
                            : currentPrice - (risk * minRR);
                        
                        openTrade = {
                            entryIndex: i,
                            entryPrice: currentPrice,
                            bias: signal.bias,
                            grade: signal.grade,
                            expectedWR: signal.expectedWinRate,
                            stopLoss: stopLoss,
                            takeProfit: takeProfit,
                            positionMultiplier: signal.positionMultiplier || 1.0
                        };
                    }
                }
            }
            
            // Calculate results
            const wins = trades.filter(t => t.win).length;
            const losses = trades.filter(t => !t.win).length;
            const winRate = trades.length > 0 ? (wins / trades.length * 100).toFixed(1) : 0;
            const totalReturn = ((balance - initialBalance) / initialBalance * 100).toFixed(2);
            const profitFactor = trades.filter(t => t.win).reduce((s, t) => s + t.pnl, 0) / 
                                 Math.abs(trades.filter(t => !t.win).reduce((s, t) => s + t.pnl, 0)) || 0;
            
            // Grade breakdown
            const gradeStats = {};
            trades.forEach(t => {
                if (!gradeStats[t.grade]) gradeStats[t.grade] = { wins: 0, total: 0 };
                gradeStats[t.grade].total++;
                if (t.win) gradeStats[t.grade].wins++;
            });
            
            // Display results
            resultsDiv.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-value">${trades.length}</div><div class="stat-label">Total Trades</div></div>
                    <div class="stat-card"><div class="stat-value ${winRate >= 60 ? 'buy' : (winRate >= 40 ? '' : 'sell')}">${winRate}%</div><div class="stat-label">Win Rate</div></div>
                    <div class="stat-card"><div class="stat-value ${totalReturn >= 0 ? 'buy' : 'sell'}">${totalReturn}%</div><div class="stat-label">Total Return</div></div>
                    <div class="stat-card"><div class="stat-value">$${balance.toFixed(2)}</div><div class="stat-label">Final Balance</div></div>
                    <div class="stat-card"><div class="stat-value">${wins}</div><div class="stat-label">Winning Trades</div></div>
                    <div class="stat-card"><div class="stat-value">${losses}</div><div class="stat-label">Losing Trades</div></div>
                    <div class="stat-card"><div class="stat-value">${profitFactor.toFixed(2)}</div><div class="stat-label">Profit Factor</div></div>
                    <div class="stat-card"><div class="stat-value">${signalsCount}</div><div class="stat-label">Signals Generated</div></div>
                </div>
                <hr>
                <div class="grade-table">
                    <h3>📊 Performance by Grade</h3>
                    ${Object.entries(gradeStats).map(([grade, stats]) => {
                        const wr = (stats.wins / stats.total * 100).toFixed(1);
                        return `<div class="grade-row"><span>${grade}</span><span>${stats.total} trades</span><span class="${wr >= 60 ? 'buy' : 'sell'}">${wr}% win rate</span></div>`;
                    }).join('')}
                </div>
                <hr>
                <div style="font-size: 12px; color: #8a99b0; margin-top: 15px;">
                    📅 Period: ${startDate} to ${endDate} | ⏱️ Interval: ${interval}<br>
                    💰 Initial Balance: $${initialBalance} | ⚠️ Risk: ${riskPercent}% per trade | 📐 Min RR: 1:${minRR}
                </div>
            `;
            
        } catch(err) {
            resultsDiv.innerHTML = `<div class="error">❌ Error: ${err.message}<br><br>Try a different date range or symbol.</div>`;
        }
    }
</script>
</body>
</html>
