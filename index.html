<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—BLACK | SOVEREIGN V73.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; position: fixed; width: 100vw; height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-glow { color: #00f2ff; text-shadow: 0 0 25px rgba(0,242,255,0.8); }
        .active-ring { border-color: #00f2ff !important; box-shadow: 0 0 40px rgba(0,242,255,0.15); }
        .status-pill { font-[900] text-[7px] tracking-[0.2em] px-3 py-1.5 rounded-full border border-white/5 uppercase bg-white/5; }
        .log-entry { border-left: 2px solid #00f2ff; background: rgba(0,242,255,0.03); padding: 8px; margin-bottom: 6px; border-radius: 0 10px 10px 0; font-size: 9px; font-weight: 800; color: #00f2ff; text-transform: uppercase; }
    </style>
</head>
<body class="bg-black select-none p-6">

    <div id="app" class="max-w-lg mx-auto flex flex-col h-full">
        <header class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-4xl font-900 italic tracking-tighter neon-glow uppercase leading-none">OMNI—BLACK</h1>
                <p class="text-[8px] uppercase tracking-[0.5em] text-white/30 mt-2 font-black italic">Sovereign 2.5 Dual-Core</p>
            </div>
            <button onclick="ui.toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center border-white/10 active:scale-90 transition-all">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </button>
        </header>

        <div class="glass rounded-[30px] p-1 flex mb-6 border-white/5">
            <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-4 rounded-[25px] text-[10px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg">Scalp (1M)</button>
            <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-4 rounded-[25px] text-[10px] font-900 uppercase tracking-widest text-white/20">Day (1H)</button>
        </div>

        <div class="grid grid-cols-2 gap-4 flex-grow mb-6">
            <div id="box0" onclick="ui.trigger(0)" class="glass rounded-[40px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 active:scale-95 transition-all">
                <input type="file" id="f0" hidden onchange="engine.stage(0)">
                <span id="l0" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase text-center px-4">HTF Structure</span>
                <div id="ok0" class="hidden text-cyan-400 font-900 text-lg italic uppercase">Locked</div>
            </div>
            <div id="box1" onclick="ui.trigger(1)" class="glass rounded-[40px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 active:scale-95 transition-all">
                <input type="file" id="f1" hidden onchange="engine.stage(1)">
                <span id="l1" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase text-center px-4">ITF Bias</span>
                <div id="ok1" class="hidden text-cyan-400 font-900 text-lg italic uppercase">Locked</div>
            </div>
            <div id="box2" onclick="ui.trigger(2)" class="glass rounded-[40px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 active:scale-95 transition-all">
                <input type="file" id="f2" hidden onchange="engine.stage(2)">
                <span id="l2" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase text-center px-4">LTF Trigger</span>
                <div id="ok2" class="hidden text-cyan-400 font-900 text-lg italic uppercase">Locked</div>
            </div>
            <div id="box3" onclick="ui.trigger(3)" class="glass rounded-[40px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 active:scale-95 transition-all">
                <input type="file" id="f3" hidden onchange="engine.stage(3)">
                <span id="l3" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase text-center px-4">DXY / News</span>
                <div id="ok3" class="hidden text-cyan-400 font-900 text-lg italic uppercase">Locked</div>
            </div>
        </div>

        <div id="logArea" class="max-h-24 overflow-y-auto mb-4 px-2 opacity-80"></div>

        <button id="igniteBtn" onclick="engine.ignite()" class="w-full bg-white text-black font-900 py-6 rounded-[30px] uppercase text-[12px] tracking-[0.5em] active:scale-95 transition-all shadow-2xl">Execute Sovereign Logic</button>
    </div>

    <div id="settings" class="fixed inset-0 bg-black/95 backdrop-blur-3xl z-50 hidden flex items-center justify-center p-10">
        <div class="w-full max-w-xs flex flex-col">
            <h2 class="text-3xl font-900 italic tracking-tighter text-cyan-400 mb-10 text-center uppercase">Engine Access</h2>
            <div class="space-y-4 mb-10">
                <input type="password" id="key" class="w-full bg-white/5 p-6 rounded-2xl text-cyan-400 text-center font-black outline-none border border-white/10" placeholder="API KEY">
                <div class="flex gap-4">
                    <input type="number" id="bal" class="w-1/2 bg-white/5 p-6 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="BAL $">
                    <input type="number" id="risk" class="w-1/2 bg-white/5 p-6 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="RISK %">
                </div>
            </div>
            <button onclick="ui.save()" class="w-full bg-white text-black font-900 py-6 rounded-3xl text-[10px] uppercase tracking-widest active:scale-95">Verify Connection</button>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
