<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—DUAL | V62.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .active-box { border-color: #00f2ff !important; box-shadow: 0 0 25px rgba(0,242,255,0.2); }
        .neon-text { text-shadow: 0 0 15px rgba(0,242,255,0.6); }
        input[type="checkbox"]:checked ~ .dot { transform: translateX(1.5rem); background-color: #00f2ff; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto flex flex-col min-h-screen">

    <div class="flex justify-between items-start mb-10">
        <div>
            <h1 class="text-4xl font-900 italic tracking-tighter neon-text text-cyan-400 uppercase leading-none">OMNI—DUAL</h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold mt-2">TERMINAL ACTIVE V62.6</p>
        </div>
        <button onclick="toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center">
            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
        </button>
    </div>

    <div class="glass p-6 rounded-[32px] mb-8 flex items-center justify-between">
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Aggressive Scalp</span>
        <label class="flex items-center cursor-pointer">
            <div class="relative">
                <input type="checkbox" id="mode-input" class="sr-only">
                <div class="block bg-white/5 w-14 h-8 rounded-full border border-white/10"></div>
                <div class="dot absolute left-1 top-1 bg-white/20 w-6 h-6 rounded-full transition-all"></div>
            </div>
        </label>
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div id="c0" onclick="injectGallery(0)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
            <input type="file" id="f0" accept="image/*" hidden onchange="handleFile(0)">
            <span class="text-[10px] font-black text-white/20 uppercase">1H BIAS</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover opacity-0">
        </div>
        <div id="c1" onclick="injectGallery(1)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
            <input type="file" id="f1" accept="image/*" hidden onchange="handleFile(1)">
            <span class="text-[10px] font-black text-white/20 uppercase">15M STRUCT</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover opacity-0">
        </div>
    </div>

    <button id="goBtn" onclick="runNeuralScan()" class="w-full bg-white text-black font-900 py-6 rounded-[32px] uppercase tracking-[0.3em] text-[11px]">Execute Command</button>

    <div id="outPanel" class="hidden mt-10">
        <h2 id="biasTxt" class="text-[120px] font-900 italic tracking-tighter leading-none text-center">--</h2>
        <div id="logicLog" class="glass p-8 rounded-[40px] text-[12px] uppercase italic text-center text-white/50"></div>
    </div>

    <div id="settingsPanel" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-xs text-center">
            <h3 class="text-3xl font-900 italic tracking-tighter mb-8 uppercase text-cyan-400">Hardware Link</h3>
            <input type="password" id="apiKeyIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-cyan-400 text-center mb-4" placeholder="NEURAL_KEY">
            <button onclick="saveCore()" class="w-full bg-white text-black font-900 py-6 rounded-2xl uppercase tracking-[0.4em]">Sync Core</button>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
