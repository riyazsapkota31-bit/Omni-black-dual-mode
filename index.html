<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI—DUAL | ACTIVE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .active-box { border-color: #00f2ff; box-shadow: inset 0 0 20px rgba(0,242,255,0.1); }
        .neon-text { text-shadow: 0 0 15px rgba(0,242,255,0.6); }
        input[type="checkbox"]:checked ~ .dot { transform: translateX(1.5rem); background-color: #00f2ff; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto">

    <div class="flex justify-between items-start mb-10">
        <div>
            <h1 class="text-4xl font-900 italic tracking-tighter neon-text text-cyan-400 leading-none">OMNI—DUAL</h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-white/30 font-bold mt-2">Terminal Active V62.6</p>
        </div>
        <button onclick="toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center active:scale-90 transition-transform">
            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
        </button>
    </div>

    <div class="glass p-6 rounded-[32px] mb-8 flex items-center justify-between">
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Aggressive Scalp</span>
        <label class="flex items-center cursor-pointer">
            <div class="relative">
                <input type="checkbox" id="mode-input" class="sr-only">
                <div class="block bg-white/5 w-14 h-8 rounded-full border border-white/10"></div>
                <div class="dot absolute left-1 top-1 bg-white/20 w-6 h-6 rounded-full transition-all duration-300"></div>
            </div>
        </label>
        <span class="text-[10px] font-900 uppercase tracking-widest text-white/20">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="card0" onclick="triggerUpload(0)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f0" accept="image/*" hidden onchange="handleFile(0)">
            <div id="icon0" class="mb-2 opacity-20 group-hover:opacity-100 transition-opacity">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path></svg>
            </div>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">1H Bias</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity">
        </div>
        <div id="card1" onclick="triggerUpload(1)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f1" accept="image/*" hidden onchange="handleFile(1)">
            <div id="icon1" class="mb-2 opacity-20 group-hover:opacity-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            </div>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">15M Struct</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity">
        </div>
        <div id="card2" onclick="triggerUpload(2)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
            <input type="file" id="f2" accept="image/*" hidden onchange="handleFile(2)">
            <div id="icon2" class="mb-2 opacity-20 group-hover:opacity-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="text-[10px] font-black text-white/20 uppercase tracking-tighter">1M Trigger</span>
            <img id="p2" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity">
        </div>
        <div id="card3" onclick="triggerUpload(3)" class="glass h-40 rounded-[32px] flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group border-dashed border-cyan-500/20">
            <input type="file" id="f3" accept="image/*" hidden onchange="handleFile(3)">
            <div id="icon3" class="mb-2 opacity-20 group-hover:opacity-100 text-cyan-400/50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            </div>
            <span class="text-[10px] font-black text-cyan-400/40 uppercase tracking-widest">DXY Data</span>
            <img id="p3" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity">
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="w-full bg-white text-black font-900 py-6 rounded-[32px] uppercase tracking-[0.3em] text-xs shadow-[0_0_40px_rgba(255,255,255,0.1)] active:scale-95 transition-all">Execute Command</button>

    <div id="settingsPanel" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full text-center">
            <h3 class="text-2xl font-900 italic tracking-tighter mb-12 uppercase">Hardware Link</h3>
            <div class="space-y-4 max-w-xs mx-auto">
                <input type="password" id="apiKeyIn" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-cyan-400 text-center tracking-widest" placeholder="••••••••••••••••">
                <div class="flex gap-4">
                    <input type="number" id="balanceIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-sm" placeholder="BAL">
                    <input type="number" id="riskIn" class="w-1/2 bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-sm" placeholder="RISK %">
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-black font-900 py-5 rounded-2xl text-[10px] uppercase tracking-[0.4em] mt-6">Sync Core</button>
                <button onclick="toggleSettings()" class="text-[9px] uppercase tracking-widest text-white/20 mt-4 block mx-auto font-black">Back</button>
            </div>
        </div>
    </div>

    <div id="outPanel" class="hidden mt-12 pb-24 text-center">
        <h2 id="biasTxt" class="text-[120px] font-900 italic tracking-tighter leading-none mb-4">--</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl"><p class="text-[8px] text-white/30 uppercase font-black mb-1">Entry</p><span id="entVal" class="text-xl font-900 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-3xl"><p class="text-[8px] text-white/30 uppercase font-black mb-1">Lot</p><span id="lotVal" class="text-xl font-900 text-cyan-400 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-3xl border-rose-500/10"><p class="text-[8px] text-rose-500/40 uppercase font-black mb-1">SL</p><span id="slVal" class="text-xl font-900 text-rose-500 tracking-tighter">--</span></div>
            <div class="glass p-6 rounded-3xl border-emerald-500/10"><p class="text-[8px] text-emerald-400/40 uppercase font-black mb-1">TP</p><span id="tpVal" class="text-xl font-900 text-emerald-400 tracking-tighter">--</span></div>
        </div>
        <div id="logicSummary" class="glass p-8 rounded-[40px] text-[12px] leading-relaxed text-white/50 uppercase italic font-medium"></div>
    </div>

    <script src="strategies.js"></script>
    <script>
        var files = [null, null, null, null];
        function triggerUpload(i) { document.getElementById(`f${i}`).click(); }
        function handleFile(i) {
            const file = document.getElementById(`f${i}`).files[0];
            if(!file) return;
            files[i] = file;
            const r = new FileReader();
            r.onload = (e) => {
                const img = document.getElementById(`p${i}`);
                const card = document.getElementById(`card${i}`);
                const icon = document.getElementById(`icon${i}`);
                img.src = e.target.result;
                img.classList.remove('opacity-0');
                card.classList.add('active-box');
                icon.classList.add('hidden');
            };
            r.readAsDataURL(file);
        }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('omni_kIn', document.getElementById('apiKeyIn').value);
            localStorage.setItem('omni_bIn', document.getElementById('balanceIn').value);
            localStorage.setItem('omni_rIn', document.getElementById('riskIn').value);
            toggleSettings();
        }
    </script>
</body>
</html>
