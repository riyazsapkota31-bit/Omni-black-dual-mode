<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI—BLACK | NEURAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .neon-border { border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .neon-border:hover { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter italic text-cyan-400">OMNI—BLACK</h1>
            <p class="text-[10px] uppercase tracking-widest text-white/40">Terminal V62.6 Neural</p>
        </div>
        <button onclick="location.reload()" class="p-2 bg-white/5 rounded-lg border border-white/10 text-xs">RESET</button>
    </header>

    <div class="bg-white/5 p-4 rounded-2xl mb-6 border border-white/10 flex items-center justify-between">
        <span class="text-[10px] font-black uppercase tracking-widest text-white/60">Aggressive Scalping</span>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="mode-input" class="sr-only peer">
            <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-500"></div>
        </label>
        <span class="text-[10px] font-black uppercase tracking-widest text-white/60">Surgical Day</span>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div onclick="document.getElementById('f1').click()" class="neon-border h-32 rounded-2xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f1" hidden onchange="handleUpload(event, 0)">
            <span class="text-[10px] font-bold text-white/30 uppercase">BOX 01</span>
            <img id="p0" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f2').click()" class="neon-border h-32 rounded-2xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f2" hidden onchange="handleUpload(event, 1)">
            <span class="text-[10px] font-bold text-white/30 uppercase">BOX 02</span>
            <img id="p1" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f3').click()" class="neon-border h-32 rounded-2xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
            <input type="file" id="f3" hidden onchange="handleUpload(event, 2)">
            <span class="text-[10px] font-bold text-white/30 uppercase">BOX 03</span>
            <img id="p2" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div onclick="document.getElementById('f4').click()" class="neon-border h-32 rounded-2xl bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden border-dashed">
            <input type="file" id="f4" hidden onchange="handleUpload(event, 3)">
            <span class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">DXY DATA</span>
            <img id="p3" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm hover:bg-cyan-400 transition-colors">Execute Command</button>

    <div id="outPanel" class="hidden mt-8 animate-pulse-once">
        <div class="text-center mb-6">
            <h2 id="biasTxt" class="text-8xl font-black italic tracking-tighter">--</h2>
            <p id="subMode" class="text-[10px] text-white/40 uppercase tracking-[0.3em] mt-[-10px]">Neural Trade Signal</p>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <span class="text-[9px] text-white/40 uppercase block mb-1 font-bold">Entry Price</span>
                <span id="entVal" class="text-lg font-black tracking-tight text-white">0.0000</span>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <span class="text-[9px] text-white/40 uppercase block mb-1 font-bold">Lot Size</span>
                <span id="lotVal" class="text-lg font-black tracking-tight text-cyan-400">0.0000</span>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-rose-500/20">
                <span class="text-[9px] text-rose-500 uppercase block mb-1 font-bold">Stop Loss</span>
                <span id="slVal" class="text-lg font-black tracking-tight text-rose-500">0.0000</span>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-emerald-500/20">
                <span class="text-[9px] text-emerald-400 uppercase block mb-1 font-bold">Take Profit</span>
                <span id="tpVal" class="text-lg font-black tracking-tight text-emerald-400">0.0000</span>
            </div>
        </div>

        <div id="logicSummary" class="bg-white/5 p-6 rounded-3xl border border-white/10">
            </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        function handleUpload(e, i) {
            const file = e.target.files[0];
            if(!file) return;
            files[i] = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.getElementById(`p${i}`);
                img.src = ev.target.result;
                img.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
