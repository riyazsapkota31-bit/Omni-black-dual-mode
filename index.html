<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—BLACK | SOVEREIGN V73.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; position: fixed; width: 100vw; height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-glow { color: #00f2ff; text-shadow: 0 0 25px rgba(0,242,255,0.8); }
        .active-ring { border-color: #00f2ff !important; box-shadow: 0 0 40px rgba(0,242,255,0.15); }
        .status-pill { font-[900] text-[7px] tracking-[0.2em] px-3 py-1.5 rounded-full border border-white/5 uppercase bg-white/5; }
    </style>
</head>
<body class="bg-black select-none p-8">

    <div id="main" class="max-w-lg mx-auto flex flex-col h-full">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-5xl font-900 italic tracking-tighter neon-glow uppercase leading-none">OMNI—BLACK</h1>
                <p class="text-[9px] uppercase tracking-[0.5em] text-white/30 mt-3 font-black">STABLE CORES: 2.5 FLASH / LITE</p>
            </div>
            <button onclick="ui.toggleSettings()" class="w-16 h-16 glass rounded-3xl flex items-center justify-center border-white/10 active:scale-90 transition-all">
                <svg class="w-7 h-7 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </button>
        </header>

        <div class="glass rounded-[40px] p-2 flex mb-8 border-white/5">
            <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-5 rounded-[32px] text-[10px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg shadow-cyan-500/20">Scalping</button>
            <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-5 rounded-[32px] text-[10px] font-900 uppercase tracking-widest text-white/20">Day Trading</button>
        </div>

        <div class="grid grid-cols-2 gap-4 flex-grow mb-8">
            <div id="box0" onclick="ui.trigger(0)" class="glass rounded-[45px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f0" accept="image/*" hidden onchange="engine.stage(0)">
                <span id="l0" class="text-[9px] font-black opacity-20 tracking-[0.4em] uppercase">HTF BIAS</span>
                <div id="ok0" class="hidden text-cyan-400 font-900 text-xl uppercase italic">LOCKED</div>
            </div>
            <div id="box1" onclick="ui.trigger(1)" class="glass rounded-[45px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f1" accept="image/*" hidden onchange="engine.stage(1)">
                <span id="l1" class="text-[9px] font-black opacity-20 tracking-[0.4em] uppercase">M15 STRUCTURE</span>
                <div id="ok1" class="hidden text-cyan-400 font-900 text-xl uppercase italic">LOCKED</div>
            </div>
            <div id="box2" onclick="ui.trigger(2)" class="glass rounded-[45px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f2" accept="image/*" hidden onchange="engine.stage(2)">
                <span id="l2" class="text-[9px] font-black opacity-20 tracking-[0.4em] uppercase">TRIGGER</span>
                <div id="ok2" class="hidden text-cyan-400 font-900 text-xl uppercase italic">LOCKED</div>
            </div>
            <div id="box3" onclick="ui.trigger(3)" class="glass rounded-[45px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f3" accept="image/*" hidden onchange="engine.stage(3)">
                <span id="l3" class="text-[9px] font-black opacity-20 tracking-[0.4em] uppercase">DXY/NEWS</span>
                <div id="ok3" class="hidden text-cyan-400 font-900 text-xl uppercase italic">LOCKED</div>
            </div>
        </div>

        <button id="igniteBtn" onclick="engine.ignite()" class="w-full bg-white text-black font-900 py-8 rounded-[40px] uppercase text-[12px] tracking-[0.6em] shadow-2xl active:bg-cyan-400 active:scale-95 transition-all">Execute Signal</button>
    </div>

    <div id="settings" class="fixed inset-0 bg-black/95 backdrop-blur-3xl z-50 hidden flex items-center justify-center p-10">
        <div class="w-full max-w-xs flex flex-col items-center">
            <h2 class="text-3xl font-900 italic tracking-tighter text-cyan-400 mb-12 uppercase">Engine Config</h2>
            <div class="w-full space-y-4">
                <input type="password" id="key" class="w-full bg-white/5 p-6 rounded-2xl text-cyan-400 text-center font-black outline-none border border-white/10" placeholder="API KEY">
                <div class="flex gap-4">
                    <input type="number" id="bal" class="w-1/2 bg-white/5 p-6 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="BAL $">
                    <input type="number" id="risk" class="w-1/2 bg-white/5 p-6 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="RISK %">
                </div>
            </div>
            <button onclick="ui.save()" class="w-full bg-white text-black font-900 py-6 rounded-3xl mt-12 text-[10px] uppercase tracking-widest active:scale-95">Lock Parameters</button>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
