<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI—BLACK | SOVEREIGN V73.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-glow { color: #00f2ff; text-shadow: 0 0 25px rgba(0,242,255,0.8); }
        .active-ring { border-color: #00f2ff !important; box-shadow: 0 0 40px rgba(0,242,255,0.15); }
    </style>
</head>
<body class="bg-black select-none p-5">

    <div id="main" class="max-w-lg mx-auto flex flex-col min-h-screen">
        <header class="flex justify-between items-start mb-4 mt-2">
            <div>
                <h1 class="text-4xl font-900 italic tracking-tighter neon-glow uppercase leading-none">OMNI—BLACK</h1>
                <p class="text-[8px] uppercase tracking-[0.4em] text-white/30 mt-2 font-black italic">Sovereign 2.5 Dual-Core</p>
            </div>
            <button onclick="ui.toggleSettings()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center border-white/10 active:scale-90 transition-all">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </button>
        </header>

        <div class="glass rounded-[25px] p-1.5 flex mb-5 border-white/5">
            <button id="btnScalp" onclick="engine.setMode('scalp')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest bg-cyan-500 text-black shadow-lg">Scalp (1M)</button>
            <button id="btnDay" onclick="engine.setMode('day')" class="flex-1 py-3.5 rounded-[20px] text-[9px] font-900 uppercase tracking-widest text-white/20">Day (1H)</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div id="box0" onclick="ui.trigger(0)" class="glass aspect-square rounded-[35px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f0" accept="image/*" hidden onchange="engine.stage(0)">
                <span id="l0" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase">HTF Structure</span>
                <div id="ok0" class="hidden text-cyan-400 font-900 text-lg uppercase italic">LOCKED</div>
            </div>
            <div id="box1" onclick="ui.trigger(1)" class="glass aspect-square rounded-[35px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f1" accept="image/*" hidden onchange="engine.stage(1)">
                <span id="l1" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase">ITF Bias</span>
                <div id="ok1" class="hidden text-cyan-400 font-900 text-lg uppercase italic">LOCKED</div>
            </div>
            <div id="box2" onclick="ui.trigger(2)" class="glass aspect-square rounded-[35px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f2" accept="image/*" hidden onchange="engine.stage(2)">
                <span id="l2" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase">LTF Trigger</span>
                <div id="ok2" class="hidden text-cyan-400 font-900 text-lg uppercase italic">LOCKED</div>
            </div>
            <div id="box3" onclick="ui.trigger(3)" class="glass aspect-square rounded-[35px] flex flex-col items-center justify-center border-dashed border-2 border-white/5 relative active:scale-95 transition-all">
                <input type="file" id="f3" accept="image/*" hidden onchange="engine.stage(3)">
                <span id="l3" class="text-[8px] font-black opacity-20 tracking-[0.3em] uppercase">DXY / News</span>
                <div id="ok3" class="hidden text-cyan-400 font-900 text-lg uppercase italic">LOCKED</div>
            </div>
        </div>

        <button id="igniteBtn" onclick="engine.ignite()" class="w-full bg-white text-black font-900 py-6 rounded-[30px] uppercase text-[11px] tracking-[0.5em] shadow-2xl active:scale-95 transition-all">Execute Signal</button>
    </div>

    <div id="result-screen" class="fixed inset-0 bg-black/98 z-[60] hidden flex flex-col p-6 overflow-y-auto">
        <button onclick="document.getElementById('result-screen').classList.add('hidden')" class="w-full bg-white text-black font-900 py-6 rounded-[30px] uppercase text-[11px] tracking-[0.5em] mb-8">Execute Command</button>
        <div class="text-center mb-8">
            <h2 id="res-bias" class="text-[110px] font-900 italic leading-none tracking-tighter uppercase">--</h2>
            <p class="text-[10px] uppercase tracking-[0.4em] text-white/30 font-black mt-2 italic">Surgical Day Trade Engine</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass rounded-[35px] p-6 text-center border-white/5"><span class="text-[8px] font-black opacity-30 uppercase tracking-widest block mb-2">Entry</span><div id="res-entry" class="text-2xl font-900 tracking-tighter italic">--</div></div>
            <div class="glass rounded-[35px] p-6 text-center border-white/5"><span class="text-[8px] font-black opacity-30 uppercase tracking-widest block mb-2 text-cyan-400">Lot Size</span><div id="res-lot" class="text-2xl font-900 text-cyan-400 tracking-tighter italic">--</div></div>
            <div class="glass rounded-[35px] p-6 text-center border-white/5"><span class="text-[8px] font-black opacity-30 uppercase tracking-widest block mb-2 text-red-500">Stop Loss</span><div id="res-sl" class="text-2xl font-900 text-red-500 tracking-tighter italic">--</div></div>
            <div class="glass rounded-[35px] p-6 text-center border-white/5"><span class="text-[8px] font-black opacity-30 uppercase tracking-widest block mb-2 text-emerald-400">Take Profit</span><div id="res-tp" class="text-2xl font-900 text-emerald-400 tracking-tighter italic">--</div></div>
        </div>
        <div class="glass rounded-[40px] p-8 border-white/5">
            <div class="flex gap-2 mb-4">
                <span class="text-[7px] bg-cyan-900/30 text-cyan-400 px-3 py-1 rounded-full font-black uppercase tracking-widest">RR 1:2.5</span>
                <span class="text-[7px] bg-emerald-900/30 text-emerald-400 px-3 py-1 rounded-full font-black uppercase tracking-widest">6/8 CONF</span>
                <span id="res-asset" class="text-[7px] bg-white/10 text-white px-3 py-1 rounded-full font-black uppercase tracking-widest italic">--</span>
            </div>
            <p id="res-logic" class="text-[10px] leading-relaxed text-white/70 font-medium uppercase tracking-wider italic"></p>
        </div>
    </div>

    <div id="settings" class="fixed inset-0 bg-black/95 backdrop-blur-3xl z-50 hidden flex items-center justify-center p-10">
        <div class="w-full max-w-xs flex flex-col items-center">
            <h2 class="text-3xl font-900 italic tracking-tighter text-cyan-400 mb-10 uppercase">Engine Config</h2>
            <div class="w-full space-y-4">
                <input type="password" id="key" class="w-full bg-white/5 p-5 rounded-2xl text-cyan-400 text-center font-black outline-none border border-white/10" placeholder="API KEY">
                <div class="flex gap-4">
                    <input type="number" id="bal" class="w-1/2 bg-white/5 p-5 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="BAL $">
                    <input type="number" id="risk" class="w-1/2 bg-white/5 p-5 rounded-2xl text-center font-black outline-none border border-white/10" placeholder="RISK %">
                </div>
            </div>
            <button onclick="ui.save()" class="w-full bg-white text-black font-900 py-5 rounded-[25px] mt-10 text-[10px] uppercase tracking-widest active:scale-95">Lock Parameters</button>
        </div>
    </div>
    <script src="strategies.js"></script>
</body>
</html>
