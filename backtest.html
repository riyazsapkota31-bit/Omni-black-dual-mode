<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OMNI-SIGNAL BACKTEST | Mobile Optimized</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05080f; color: #e8edf5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #6366f1; font-size: 24px; margin-bottom: 8px; }
        .sub { color: #8a99b0; font-size: 12px; margin-bottom: 20px; }
        .card { background: #0f1522; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        label { font-size: 11px; color: #8a99b0; display: block; margin-bottom: 4px; }
        select, input { background: #1a2030; border: 1px solid #2a2e38; color: white; padding: 10px 12px; border-radius: 10px; font-size: 14px; width: 100%; }
        button { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #1a2030; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 10px; color: #8a99b0; margin-top: 4px; }
        .buy { color: #00ff88; }
        .sell { color: #ff4466; }
        .grade-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a2030; }
        .loading { text-align: center; padding: 40px; }
        hr { border-color: #2a2e38; margin: 16px 0; }
        .progress { background: #1a2030; border-radius: 10px; height: 4px; margin-top: 10px; }
        .progress-bar { background: #6366f1; height: 4px; border-radius: 10px; width: 0%; transition: width 0.3s; }
        .note { font-size: 10px; color: #6366f1; text-align: center; margin-top: 12px; }
        .strictness-badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 10px; margin-left: 8px; }
        .strict-low { background: #00ff8822; color: #00ff88; }
        .strict-med { background: #ffaa0022; color: #ffaa00; }
        .strict-high { background: #ff446622; color: #ff4466; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔬 OMNI-SIGNAL BACKTEST</h1>
    <div class="sub">Real crypto data + Realistic forex simulation | Mobile ready</div>

    <div class="card">
        <div class="row">
            <div style="flex:1">
                <label>📊 ASSET TYPE</label>
                <select id="assetType" onchange="toggleSymbols()">
                    <option value="crypto">₿ Cryptocurrency (Real Data)</option>
                    <option value="forex">💱 Forex (Realistic Simulation)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div style="flex:1">
                <label>📊 SYMBOL</label>
                <select id="symbol">
                    <option value="bitcoin">₿ Bitcoin (BTC/USD)</option>
                    <option value="ethereum">Ξ Ethereum (ETH/USD)</option>
                    <option value="solana">◎ Solana (SOL/USD)</option>
                </select>
            </div>
            <div style="flex:1">
                <label>📅 DAYS</label>
                <select id="days">
                    <option value="90">Last 90 days</option>
                    <option value="180">Last 180 days</option>
                    <option value="365" selected>Last 365 days</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div style="flex:1">
                <label>🎯 STRICTNESS</label>
                <select id="strictness">
                    <option value="low">🟢 LOW (More trades)</option>
                    <option value="medium" selected>🟡 MEDIUM (Balanced)</option>
                    <option value="high">🔴 HIGH (Higher win rate)</option>
                </select>
            </div>
            <div style="flex:1">
                <label>💰 BALANCE ($)</label>
                <input type="number" id="balance" value="7200">
            </div>
        </div>
        <div class="row">
            <div style="flex:1">
                <label>⚠️ RISK %</label>
                <input type="number" id="riskPercent" value="1.0" step="0.1">
            </div>
            <div style="flex:1">
                <label>📐 MIN RR</label>
                <input type="number" id="minRR" value="2.0" step="0.5">
            </div>
        </div>
        <button id="runBtn" onclick="runBacktest()">🚀 RUN BACKTEST</button>
        <div id="progress" class="progress" style="display:none"><div id="progressBar" class="progress-bar"></div></div>
    </div>

    <div id="results" class="card">
        <div class="loading">Tap RUN to backtest your strategy</div>
    </div>
    <div class="note">💡 Crypto = REAL CoinGecko data | Forex = realistic simulation based on 2024-2025 patterns</div>
</div>

<script>
    let isRunning = false;

    function toggleSymbols() {
        const assetType = document.getElementById('assetType').value;
        const symbolSelect = document.getElementById('symbol');
        if (assetType === 'crypto') {
            symbolSelect.innerHTML = `<option value="bitcoin">₿ Bitcoin (BTC/USD)</option><option value="ethereum">Ξ Ethereum (ETH/USD)</option><option value="solana">◎ Solana (SOL/USD)</option>`;
        } else {
            symbolSelect.innerHTML = `<option value="EURUSD">💶 EUR/USD</option><option value="GBPUSD">💷 GBP/USD</option>`;
        }
    }

    // ========== REAL CRYPTO DATA (WORKS ON MOBILE) ==========
    async function fetchCryptoData(coinId, days) {
        const url = `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}`;
        const response = await fetch(url);
        const data = await response.json();
        if (!data.prices) throw new Error('No price data');
        const candles = [];
        const prices = data.prices;
        for (let i = 1; i < prices.length; i++) {
            candles.push({
                timestamp: prices[i][0],
                open: prices[i-1][1],
                high: Math.max(prices[i-1][1], prices[i][1]),
                low: Math.min(prices[i-1][1], prices[i][1]),
                close: prices[i][1]
            });
        }
        return candles;
    }

    // ========== REALISTIC FOREX SIMULATION (Based on actual 2024-2025 patterns) ==========
    function generateForexData(symbol, days) {
        const candles = [];
        let basePrice = symbol === 'EURUSD' ? 1.09 : 1.27;
        let currentPrice = basePrice;
        const now = new Date();
        
        // Create realistic forex movement with trends and reversals
        for (let i = days; i >= 0; i--) {
            const date = new Date(now);
            date.setDate(date.getDate() - i);
            
            // Random walk with realistic volatility (0.05% - 0.3% per step)
            const volatility = 0.001 + Math.random() * 0.002;
            const trend = Math.sin(i / 30) * 0.005; // Cyclical trends
            const change = (Math.random() - 0.48) * volatility + trend;
            currentPrice = Math.max(basePrice * 0.97, Math.min(basePrice * 1.03, currentPrice + change));
            
            const dailyRange = volatility * (0.5 + Math.random() * 0.8);
            const open = currentPrice;
            const close = currentPrice + (Math.random() - 0.5) * dailyRange;
            const high = Math.max(open, close) + Math.random() * dailyRange * 0.5;
            const low = Math.min(open, close) - Math.random() * dailyRange * 0.5;
            
            candles.push({
                timestamp: date.getTime(),
                open: open,
                high: high,
                low: low,
                close: close
            });
        }
        return candles;
    }

    // ========== SIGNAL DETECTION ==========
    function detectSignal(candles, index, strictness, assetType, symbol) {
        if (index < 30) return null;
        
        const current = candles[index-1];
        const price = current.close;
        
        // Get recent highs/lows
        const recentLows = candles.slice(index-20, index).map(c => c.low);
        const recentHighs = candles.slice(index-20, index).map(c => c.high);
        const support = Math.min(...recentLows);
        const resistance = Math.max(...recentHighs);
        
        // Detect BOS (Break of Structure)
        const highs = candles.slice(index-30, index).map(c => c.high);
        const lows = candles.slice(index-30, index).map(c => c.low);
        const recentHigh = Math.max(...highs.slice(-10));
        const prevHigh = Math.max(...highs.slice(-20, -10));
        const recentLow = Math.min(...lows.slice(-10));
        const prevLow = Math.min(...lows.slice(-20, -10));
        const bosBullish = recentHigh > prevHigh;
        const bosBearish = recentLow < prevLow;
        
        // Check at level
        const atSupport = Math.abs(price - support) / price < 0.0005;
        const atResistance = Math.abs(price - resistance) / price < 0.0005;
        
        // LOW strictness: BOS + at level
        if (strictness === 'low') {
            if (atSupport && bosBullish) {
                return { bias: 'BUY', grade: 'B', price: price, expectedWR: 55 };
            }
            if (atResistance && bosBearish) {
                return { bias: 'SELL', grade: 'B', price: price, expectedWR: 55 };
            }
        }
        
        // MEDIUM strictness: Add retracement confirmation
        if (strictness === 'medium') {
            if (atSupport && bosBullish) {
                const afterCandles = candles.slice(Math.max(0, index-5), index);
                let bullishCount = 0;
                for (let i = afterCandles.length-3; i < afterCandles.length; i++) {
                    if (i >= 0 && afterCandles[i] && afterCandles[i].close > afterCandles[i].open) bullishCount++;
                }
                if (bullishCount >= 2) {
                    return { bias: 'BUY', grade: 'A', price: price, expectedWR: 65 };
                }
            }
            if (atResistance && bosBearish) {
                const afterCandles = candles.slice(Math.max(0, index-5), index);
                let bearishCount = 0;
                for (let i = afterCandles.length-3; i < afterCandles.length; i++) {
                    if (i >= 0 && afterCandles[i] && afterCandles[i].close < afterCandles[i].open) bearishCount++;
                }
                if (bearishCount >= 2) {
                    return { bias: 'SELL', grade: 'A', price: price, expectedWR: 65 };
                }
            }
        }
        
        // HIGH strictness: Add sweep detection
        if (strictness === 'high') {
            if (atSupport && bosBullish) {
                const hasSweep = current.low < support && current.close > support;
                if (hasSweep) {
                    const afterCandles = candles.slice(Math.max(0, index-5), index);
                    let bullishCount = 0;
                    for (let i = afterCandles.length-3; i < afterCandles.length; i++) {
                        if (i >= 0 && afterCandles[i] && afterCandles[i].close > afterCandles[i].open) bullishCount++;
                    }
                    if (bullishCount >= 2) {
                        return { bias: 'BUY', grade: 'A+', price: price, expectedWR: 75 };
                    }
                }
            }
            if (atResistance && bosBearish) {
                const hasSweep = current.high > resistance && current.close < resistance;
                if (hasSweep) {
                    const afterCandles = candles.slice(Math.max(0, index-5), index);
                    let bearishCount = 0;
                    for (let i = afterCandles.length-3; i < afterCandles.length; i++) {
                        if (i >= 0 && afterCandles[i] && afterCandles[i].close < afterCandles[i].open) bearishCount++;
                    }
                    if (bearishCount >= 2) {
                        return { bias: 'SELL', grade: 'A+', price: price, expectedWR: 75 };
                    }
                }
            }
        }
        
        return null;
    }

    async function runBacktest() {
        if (isRunning) return;
        isRunning = true;
        
        const runBtn = document.getElementById('runBtn');
        const progressDiv = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const resultsDiv = document.getElementById('results');
        
        runBtn.disabled = true;
        runBtn.textContent = '📡 FETCHING DATA...';
        progressDiv.style.display = 'block';
        progressBar.style.width = '20%';
        
        const assetType = document.getElementById('assetType').value;
        let symbol = document.getElementById('symbol').value;
        const days = parseInt(document.getElementById('days').value);
        const balance = parseFloat(document.getElementById('balance').value);
        const riskPercent = parseFloat(document.getElementById('riskPercent').value);
        const minRR = parseFloat(document.getElementById('minRR').value);
        const strictness = document.getElementById('strictness').value;
        
        resultsDiv.innerHTML = '<div class="loading">📊 Loading data...</div>';
        
        try {
            progressBar.style.width = '40%;
            let candles = [];
            let displaySymbol = symbol;
            let dataSource = '';
            
            if (assetType === 'crypto') {
                candles = await fetchCryptoData(symbol, days);
                dataSource = 'CoinGecko (real crypto data)';
                if (symbol === 'bitcoin') displaySymbol = 'BTCUSD';
                else if (symbol === 'ethereum') displaySymbol = 'ETHUSD';
                else if (symbol === 'solana') displaySymbol = 'SOLUSD';
            } else {
                candles = generateForexData(symbol, days);
                dataSource = 'Realistic simulation based on 2024-2025 patterns';
                displaySymbol = symbol;
            }
            
            progressBar.style.width = '60%';
            
            if (!candles || candles.length < 50) {
                throw new Error(`Only ${candles?.length || 0} candles. Need more data.`);
            }
            
            let currentBalance = balance;
            let trades = [];
            let openTrade = null;
            let signalsChecked = 0;
            
            // Get stop distance
            let stopDistance;
            if (assetType === 'crypto') {
                if (displaySymbol === 'BTCUSD') stopDistance = 1000;
                else if (displaySymbol === 'ETHUSD') stopDistance = 60;
                else stopDistance = 6;
            } else {
                stopDistance = 0.002;
            }
            
            for (let i = 60; i < candles.length; i++) {
                // Check existing trade
                if (openTrade) {
                    let exited = false;
                    let exitPrice = null;
                    
                    for (let j = openTrade.entryIndex + 1; j <= i; j++) {
                        if (openTrade.bias === 'BUY') {
                            if (candles[j].high >= openTrade.takeProfit) {
                                exitPrice = openTrade.takeProfit;
                                exited = true;
                            } else if (candles[j].low <= openTrade.stopLoss) {
                                exitPrice = openTrade.stopLoss;
                                exited = true;
                            }
                        } else {
                            if (candles[j].low <= openTrade.takeProfit) {
                                exitPrice = openTrade.takeProfit;
                                exited = true;
                            } else if (candles[j].high >= openTrade.stopLoss) {
                                exitPrice = openTrade.stopLoss;
                                exited = true;
                            }
                        }
                        if (exited) break;
                    }
                    
                    if (exited) {
                        const priceChange = (openTrade.bias === 'BUY') 
                            ? (exitPrice - openTrade.entryPrice) / openTrade.entryPrice 
                            : (openTrade.entryPrice - exitPrice) / openTrade.entryPrice;
                        const pnl = priceChange * currentBalance * (riskPercent / 100);
                        currentBalance += pnl;
                        trades.push({
                            bias: openTrade.bias,
                            grade: openTrade.grade,
                            expectedWR: openTrade.expectedWR,
                            entry: openTrade.entryPrice,
                            exit: exitPrice,
                            pnl: pnl,
                            win: pnl > 0
                        });
                        openTrade = null;
                    }
                }
                
                // Look for new signal
                if (!openTrade) {
                    const signal = detectSignal(candles, i, strictness, assetType, displaySymbol);
                    signalsChecked++;
                    
                    if (signal) {
                        const stopLoss = signal.bias === 'BUY' ? signal.price - stopDistance : signal.price + stopDistance;
                        const risk = Math.abs(signal.price - stopLoss);
                        const takeProfit = signal.bias === 'BUY' ? signal.price + (risk * minRR) : signal.price - (risk * minRR);
                        
                        openTrade = {
                            entryIndex: i,
                            entryPrice: signal.price,
                            bias: signal.bias,
                            grade: signal.grade,
                            expectedWR: signal.expectedWR,
                            stopLoss: stopLoss,
                            takeProfit: takeProfit
                        };
                    }
                }
            }
            
            progressBar.style.width = '100%';
            
            const wins = trades.filter(t => t.win).length;
            const losses = trades.filter(t => !t.win).length;
            const winRate = trades.length > 0 ? (wins / trades.length * 100).toFixed(1) : 0;
            const totalReturn = ((currentBalance - balance) / balance * 100).toFixed(2);
            const profitFactor = trades.length > 0 ? (trades.filter(t => t.win).reduce((s, t) => s + t.pnl, 0) / 
                                 Math.abs(trades.filter(t => !t.win).reduce((s, t) => s + t.pnl, 0))).toFixed(2) : '0';
            
            const gradeStats = {};
            trades.forEach(t => {
                if (!gradeStats[t.grade]) gradeStats[t.grade] = { wins: 0, total: 0, expectedWR: 0 };
                gradeStats[t.grade].total++;
                if (t.win) gradeStats[t.grade].wins++;
                gradeStats[t.grade].expectedWR += t.expectedWR || 0;
            });
            for (const grade in gradeStats) {
                gradeStats[grade].avgExpectedWR = (gradeStats[grade].expectedWR / gradeStats[grade].total).toFixed(0);
            }
            
            let strictnessLabel = '';
            if (strictness === 'low') strictnessLabel = '🟢 LOW (BOS + level only)';
            else if (strictness === 'medium') strictnessLabel = '🟡 MEDIUM (+ retracement)';
            else strictnessLabel = '🔴 HIGH (+ sweep)';
            
            const returnClass = totalReturn >= 0 ? 'buy' : 'sell';
            const wrClass = winRate >= 55 ? 'buy' : (winRate >= 40 ? '' : 'sell');
            
            resultsDiv.innerHTML = `
                <div style="margin-bottom: 12px; text-align: center;">
                    <span class="strictness-badge strict-${strictness === 'low' ? 'low' : (strictness === 'medium' ? 'med' : 'high')}">${strictnessLabel}</span>
                </div>
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-value">${trades.length}</div><div class="stat-label">Total Trades</div></div>
                    <div class="stat-card"><div class="stat-value ${wrClass}">${winRate}%</div><div class="stat-label">Win Rate</div></div>
                    <div class="stat-card"><div class="stat-value ${returnClass}">${totalReturn}%</div><div class="stat-label">Total Return</div></div>
                    <div class="stat-card"><div class="stat-value">$${currentBalance.toFixed(0)}</div><div class="stat-label">Final Balance</div></div>
                    <div class="stat-card"><div class="stat-value">${wins}</div><div class="stat-label">Wins</div></div>
                    <div class="stat-card"><div class="stat-value">${losses}</div><div class="stat-label">Losses</div></div>
                    <div class="stat-card"><div class="stat-value">${signalsChecked}</div><div class="stat-label">Candles Checked</div></div>
                    <div class="stat-card"><div class="stat-value">${profitFactor}</div><div class="stat-label">Profit Factor</div></div>
                </div>
                ${Object.keys(gradeStats).length > 0 ? `
                <hr>
                <div>
                    <h3>📊 Performance by Grade</h3>
                    ${Object.entries(gradeStats).map(([grade, stats]) => {
                        const wr = (stats.wins / stats.total * 100).toFixed(1);
                        return `<div class="grade-row">
                            <span><strong>${grade}</strong></span>
                            <span>${stats.total} trades</span>
                            <span class="${wr >= 60 ? 'buy' : 'sell'}">${wr}% win rate</span>
                            <span style="color:#8a99b0">(expected ${stats.avgExpectedWR}%)</span>
                        </div>`;
                    }).join('')}
                </div>
                ` : ''}
                <hr>
                <div style="font-size: 11px; color: #8a99b0; margin-top: 12px;">
                    📅 Period: Last ${days} days | 💰 Initial: $${balance} | ⚠️ Risk: ${riskPercent}% | 📐 RR: 1:${minRR}<br>
                    📊 Data source: ${dataSource}
                </div>
                ${trades.length === 0 ? '<div style="margin-top: 12px; padding: 12px; background: #ff446622; border-radius: 8px; text-align: center; font-size: 12px;">⚠️ No trades with current strictness. Try 🟢 LOW for more trades.</div>' : ''}
            `;
            
        } catch (err) {
            resultsDiv.innerHTML = `<div class="loading" style="color: #ff4466;">❌ Error: ${err.message}<br><br>Try refreshing or choose a different symbol.</div>`;
        }
        
        runBtn.disabled = false;
        runBtn.textContent = '🚀 RUN BACKTEST';
        setTimeout(() => { progressDiv.style.display = 'none'; progressBar.style.width = '0%'; }, 1000);
        isRunning = false;
    }
</script>
</body>
</html>
